<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinculados Descubiertos - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "primary-muted": "#FFF0E5",
                        "secondary": "#4D9DE0",
                        "secondary-muted": "#EBF5FF",
                        "accent": "#87C38F",
                        "accent-muted": "#F0F9F1",
                        "danger": "#E63946",
                        "danger-muted": "#FFF0F1",
                        "purple": "#9D4EDD",
                        "purple-muted": "#F5E6FF",
                        "ink": "#2B2D42",
                        "ink-muted": "#8D8FA1",
                        "bg-paper": "#FDFBF7",
                        "shadow-col": "rgba(43, 45, 66, 0.15)",
                    },
                    fontFamily: {
                        "display": ["Fredoka One", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.15)',
                        'hard-sm': '2px 2px 0px rgba(43, 45, 66, 0.15)',
                        'hard-lg': '6px 6px 0px rgba(43, 45, 66, 0.15)',
                        'inner-hard': 'inset 3px 3px 0px rgba(0,0,0,0.1)',
                    },
                    borderRadius: {
                        'card': '24px',
                        'btn': '16px',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-checkers {
            background-image: repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.05) 25px, transparent 25px, transparent 50px, rgba(255, 255, 255, 0.05) 50px, rgba(255, 255, 255, 0.05) 75px, transparent 75px, transparent 100px);
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
        
        @keyframes countdown {
            from { width: 100%; }
            to { width: 0%; }
        }
        .animate-countdown {
            animation: countdown 10s linear forwards;
        }
    </style>
</head>
<body class="bg-purple text-white font-body min-h-screen flex flex-col items-center justify-center p-6 text-center pattern-checkers max-w-md mx-auto shadow-2xl overflow-hidden relative">

    <main class="flex-1 flex flex-col items-center justify-center space-y-12 w-full animate-fade-in relative z-10">
        <div class="relative w-full">
            <div class="absolute inset-0 bg-white/10 blur-3xl rounded-full scale-110 animate-pulse"></div>
            <h1 class="font-display text-5xl md:text-6xl drop-shadow-lg leading-tight rotate-[-3deg] uppercase">¡VÍNCULO<br/>EXPUESTO!</h1>
        </div>

        <!-- Connection Visual -->
        <div class="w-full relative py-10">
            <!-- Central Line -->
            <div class="absolute top-1/2 left-0 right-0 h-2 bg-danger shadow-hard border-y-2 border-white/20 z-0"></div>
            
            <div class="grid grid-cols-2 gap-8 relative z-10">
                <!-- Vinculado 1 -->
                <div class="bg-white text-ink p-4 rounded-card border-4 border-danger shadow-hard-lg animate-[bounce_2s_infinite]">
                    <div class="w-16 h-16 bg-primary rounded-full border-4 border-ink shadow-sm flex items-center justify-center mx-auto mb-3">
                        <span class="text-3xl">🐱</span>
                    </div>
                    <p class="font-display text-sm uppercase tracking-tight">BRUNO</p>
                </div>

                <!-- Vinculado 2 -->
                <div class="bg-white text-ink p-4 rounded-card border-4 border-danger shadow-hard-lg animate-[bounce_2s_infinite_1s]">
                    <div class="w-16 h-16 bg-secondary rounded-full border-4 border-ink shadow-sm flex items-center justify-center mx-auto mb-3">
                        <span class="text-3xl">🦊</span>
                    </div>
                    <p class="font-display text-sm uppercase tracking-tight">ANA</p>
                </div>
            </div>

            <!-- The Word -->
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-20">
                <div class="bg-ink text-white px-6 py-2 rounded-full border-4 border-white shadow-hard font-display text-xl uppercase tracking-widest rotate-[5deg]">
                    RAYO
                </div>
            </div>
        </div>

        <div class="w-full max-w-xs space-y-4">
            <div class="bg-white/10 backdrop-blur-md p-4 rounded-card border-2 border-white/20">
                <p class="text-white font-bold uppercase tracking-widest text-[10px]">Los Dispersos han ganado la partida</p>
            </div>
            
            <p class="text-white/60 font-bold uppercase tracking-[0.3em] text-[10px] animate-pulse">Calculando puntos finales...</p>
            <!-- Thin Time Bar -->
            <div class="w-full h-1.5 bg-white/10 rounded-full overflow-hidden">
                <div class="h-full bg-white animate-countdown"></div>
            </div>
        </div>
    </main>

    <footer class="p-6 w-full relative z-10">
        <a href="09_Results_Caos.html" class="w-full block bg-white text-purple font-display text-2xl py-5 rounded-btn shadow-hard active:translate-y-1 transition-all uppercase tracking-widest text-center">
            Ver Resultados
        </a>
    </footer>

</body>
</html>
