<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasar Dispositivo (Desktop) - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:wght@200..800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "primary-muted": "#FFF0E5",
                        "secondary": "#4D9DE0",
                        "accent": "#87C38F",
                        "danger": "#E63946",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                        "shadow-col": "rgba(43, 45, 66, 0.15)",
                    },
                    fontFamily: {
                        "display": ["Fredoka", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.15)',
                        'hard-lg': '8px 8px 0px rgba(43, 45, 66, 0.15)',
                    },
                    borderRadius: {
                        'card': '32px',
                        'btn': '20px',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-dots {
            background-image: radial-gradient(rgba(43, 45, 66, 0.1) 2px, transparent 2px);
            background-size: 40px 40px;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
        
        @keyframes countdown {
            from { width: 100%; }
            to { width: 0%; }
        }
        .animate-countdown {
            animation: countdown 10s linear forwards;
        }
        
        .floating {
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }
    </style>
</head>
<body class="bg-bg-paper text-ink font-body min-h-screen flex flex-col items-center justify-between p-12 text-center pattern-dots overflow-hidden relative">

    <header class="w-full max-w-6xl flex justify-between items-start z-10">
        <div class="bg-primary text-white px-8 py-3 rounded-full border-4 border-ink flex items-center gap-3 shadow-hard rotate-[-1deg]">
            <span class="material-symbols-outlined text-white">group</span>
            <span class="font-display text-xl uppercase tracking-widest">Modo Local</span>
        </div>
        <div class="text-right">
            <p class="text-xs font-bold uppercase tracking-[0.3em] text-ink/40 mb-1">Fase de</p>
            <p class="font-display text-4xl uppercase text-ink">Asignación</p>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center space-y-16 w-full max-w-4xl z-10">
        <div class="relative w-64 h-64 flex items-center justify-center floating">
            <div class="absolute inset-0 bg-primary/20 rounded-full animate-ping scale-150"></div>
            <div class="bg-white rounded-full p-12 shadow-hard-lg border-8 border-ink relative z-10">
                <span class="material-symbols-outlined text-primary text-9xl">front_hand</span>
            </div>
        </div>

        <div class="space-y-4">
            <h1 class="font-display text-7xl uppercase tracking-tighter text-primary drop-shadow-sm leading-tight">¡Turno Completado!</h1>
            <p class="text-xl font-bold uppercase tracking-[0.4em] text-ink/30 italic">Mantén tu palabra en secreto</p>
        </div>

        <div class="bg-white p-16 rounded-card border-8 border-ink shadow-hard-lg w-full max-w-2xl relative rotate-[1deg]">
            <p class="text-ink/30 text-lg font-bold uppercase tracking-[0.4em] mb-6">Pasa el dispositivo a:</p>
            <h2 class="text-ink font-display text-8xl mb-4 uppercase tracking-[0.1em] drop-shadow-sm">BRUNO</h2>
            <div class="w-32 h-3 bg-primary/20 rounded-full mx-auto mt-8"></div>
        </div>

        <div class="w-full max-w-md space-y-6">
            <p class="text-ink/40 font-display uppercase tracking-[0.4em] text-sm animate-pulse">Esperando confirmación...</p>
            <div class="w-full h-4 bg-ink/5 rounded-full border-2 border-ink/10 overflow-hidden shadow-inner">
                <div class="h-full bg-primary animate-countdown"></div>
            </div>
        </div>
    </main>

    <footer class="w-full max-w-md z-10 pb-4">
        <a href="05_Local_RevealRole_Desktop.html" class="group relative w-full block">
            <div class="absolute inset-0 bg-primary translate-x-2 translate-y-2 rounded-btn transition-transform group-hover:translate-x-1 group-hover:translate-y-1"></div>
            <div class="relative bg-ink text-white font-display font-bold text-4xl py-8 rounded-btn border-4 border-ink transition-all group-hover:-translate-x-1 group-hover:-translate-y-1 group-active:translate-x-0 group-active:translate-y-0 uppercase tracking-widest text-center">
                Ya tengo el control
            </div>
        </a>
    </footer>

</body>
</html>
