<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Victoria de los Agentes! - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "primary-muted": "#FFF0E5",
                        "secondary": "#4D9DE0",
                        "accent": "#87C38F",
                        "accent-muted": "#F0F9F1",
                        "danger": "#E63946",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                        "shadow-col": "rgba(43, 45, 66, 0.15)",
                        "sticky-yellow": "#FFD166",
                    },
                    fontFamily: {
                        "display": ["Fredoka One", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.15)',
                        'hard-lg': '6px 6px 0px rgba(43, 45, 66, 0.15)',
                    },
                    borderRadius: {
                        'card': '24px',
                        'btn': '16px',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-checkers {
            background-image: repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.05) 25px, transparent 25px, transparent 50px, rgba(255, 255, 255, 0.05) 50px, rgba(255, 255, 255, 0.05) 75px, transparent 75px, transparent 100px);
        }
        .paper-tear {
            clip-path: polygon(0% 0%, 100% 0%, 100% 95%, 95% 100%, 85% 92%, 75% 100%, 65% 92%, 55% 100%, 45% 92%, 35% 100%, 25% 92%, 15% 100%, 5% 92%, 0% 100%);
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
        
        .confetti-slow {
            animation: confetti-fall 5s linear infinite;
        }
        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body class="bg-accent text-white font-body min-h-screen flex flex-col items-center justify-center p-6 text-center pattern-checkers max-w-md mx-auto shadow-2xl overflow-hidden relative">

    <!-- Confetti Effects -->
    <div class="absolute inset-0 pointer-events-none">
        <div class="confetti-slow absolute" style="left: 10%; background: white; width: 10px; height: 10px; animation-delay: 0s;"></div>
        <div class="confetti-slow absolute" style="left: 30%; background: #FFD166; width: 8px; height: 8px; animation-delay: 1s;"></div>
        <div class="confetti-slow absolute" style="left: 50%; background: #FF8C42; width: 12px; height: 12px; animation-delay: 0.5s;"></div>
        <div class="confetti-slow absolute" style="left: 70%; background: white; width: 9px; height: 9px; animation-delay: 2s;"></div>
        <div class="confetti-slow absolute" style="left: 90%; background: #FFD166; width: 11px; height: 11px; animation-delay: 1.5s;"></div>
    </div>

    <main class="relative z-10 flex flex-col items-center gap-8 w-full animate-fade-in">
        <h1 class="font-display text-5xl md:text-6xl drop-shadow-lg leading-tight rotate-[-2deg] uppercase tracking-tight">¡VICTORIA<br/>LOGRADA!</h1>

        <div class="bg-white text-ink w-full paper-tear shadow-hard-lg p-8 pb-16 relative">
            <div class="absolute -top-6 left-1/2 -translate-x-1/2 bg-accent text-white px-8 py-2 rounded-full font-display text-xl shadow-hard border-2 border-white uppercase">Misión Éxito</div>
            
            <div class="flex flex-col items-center mt-6">
                <!-- Victory Trophy -->
                <div class="w-32 h-32 bg-accent/10 rounded-full border-4 border-ink shadow-hard flex items-center justify-center mb-6 relative overflow-hidden group">
                    <div class="absolute inset-0 bg-accent/20 animate-pulse"></div>
                    <span class="material-symbols-outlined text-[80px] text-accent drop-shadow-sm">emoji_events</span>
                </div>

                <h2 class="font-display text-3xl mb-1 uppercase tracking-tight text-ink">¡Buen Trabajo!</h2>
                <p class="text-ink/40 text-[10px] font-extrabold uppercase tracking-[0.2em] mb-8">El Infiltrado ha sido descubierto</p>
                
                <div class="w-full space-y-3">
                    <div class="flex justify-between items-center bg-accent-muted p-4 rounded-btn border-2 border-accent/10 shadow-hard-sm">
                        <span class="text-accent font-extrabold uppercase tracking-widest text-[10px]">Agentes Victoria</span>
                        <span class="text-accent font-display text-2xl">+300</span>
                    </div>
                    <div class="flex justify-between items-center bg-accent-muted p-4 rounded-btn border-2 border-accent/10 shadow-hard-sm">
                        <span class="text-accent font-extrabold uppercase tracking-widest text-[10px]">Bono de Equipo</span>
                        <span class="text-accent font-display text-2xl">+150</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-4 w-full">
            <a href="09_Results_Points.html" class="w-full block bg-white text-accent font-display text-2xl py-5 rounded-btn shadow-hard active:translate-y-1 transition-all uppercase tracking-widest text-center">
                Ver Puntuaciones
            </a>
            <a href="04_Lobby_Tradicional.html" class="w-full block bg-ink text-white font-display text-lg py-4 rounded-btn shadow-hard active:translate-y-1 transition-all uppercase tracking-widest text-center">
                Volver al Lobby
            </a>
        </div>
    </main>

</body>
</html>
