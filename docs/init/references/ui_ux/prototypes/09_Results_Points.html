<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puntuaciones - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "primary-muted": "#FFF0E5",
                        "secondary": "#4D9DE0",
                        "secondary-muted": "#EBF5FF",
                        "accent": "#87C38F",
                        "accent-muted": "#F0F9F1",
                        "danger": "#E63946",
                        "purple": "#9D4EDD",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                        "shadow-col": "rgba(43, 45, 66, 0.15)",
                        "sticky-yellow": "#FFD166",
                    },
                    fontFamily: {
                        "display": ["Fredoka One", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.15)',
                        'hard-sm': '2px 2px 0px rgba(43, 45, 66, 0.15)',
                        'hard-lg': '6px 6px 0px rgba(43, 45, 66, 0.15)',
                    },
                    borderRadius: {
                        'card': '24px',
                        'btn': '16px',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-dots {
            background-image: radial-gradient(rgba(43, 45, 66, 0.1) 1.5px, transparent 1.5px);
            background-size: 20px 20px;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-bg-paper min-h-screen flex flex-col font-body">

    <!-- Mobile Block Container -->
    <div class="w-full max-w-md mx-auto min-h-screen bg-bg-paper shadow-2xl flex flex-col relative overflow-hidden pattern-dots">
        
        <!-- Header -->
        <header class="p-6 bg-white border-b border-ink/5 flex items-center justify-between shadow-[0_4px_20px_rgba(43,45,66,0.05)] z-20">
            <div class="flex flex-col">
                <h1 class="font-display text-2xl text-primary uppercase tracking-tight leading-none">Puntuaciones</h1>
                <p class="text-[10px] font-extrabold uppercase opacity-40 tracking-[0.2em] mt-1">Resultados de Sesión</p>
            </div>
            <div class="bg-bg-paper border-2 border-ink/5 px-4 py-1.5 rounded-full shadow-hard-sm">
                <span class="font-mono font-bold text-ink/60 text-xs">#A4B2</span>
            </div>
        </header>

        <main class="flex-1 p-6 space-y-6 overflow-y-auto no-scrollbar pb-32">
            
            <!-- Rank 1 (The Winner) -->
            <div class="bg-white p-5 rounded-card border-4 border-primary shadow-hard-lg flex items-center gap-4 relative mt-4 animate-fade-in">
                <!-- Crown Badge -->
                <div class="absolute -top-5 -left-2 bg-sticky-yellow text-ink p-2 rounded-full shadow-hard-sm border-2 border-white rotate-[-12deg]">
                    <span class="material-symbols-outlined text-2xl">workspace_premium</span>
                </div>
                
                <div class="w-16 h-16 bg-primary rounded-full border-4 border-white shadow-hard flex items-center justify-center text-4xl shrink-0">
                    🐱
                </div>
                
                <div class="flex-1">
                    <div class="flex items-center gap-2">
                        <h3 class="font-display text-xl uppercase tracking-tight text-ink">Bruno</h3>
                        <span class="bg-primary/10 text-primary text-[8px] font-bold px-2 py-0.5 rounded-full uppercase">Host</span>
                    </div>
                    <p class="text-[10px] font-bold uppercase tracking-widest text-ink/40 mt-1">Impostor • Sobrevivió</p>
                </div>
                
                <div class="text-right">
                    <p class="font-display text-2xl text-primary leading-none">+750</p>
                    <p class="text-[8px] font-extrabold uppercase tracking-tighter text-ink/30 mt-1">Total: 1,800</p>
                </div>
            </div>

            <!-- Other Players -->
            <div class="space-y-4">
                <!-- Rank 2 -->
                <div class="bg-white p-4 rounded-card border-2 border-ink/5 shadow-hard flex items-center gap-4 animate-fade-in" style="animation-delay: 0.1s;">
                    <div class="w-8 h-8 flex items-center justify-center font-display text-lg text-ink/20">2</div>
                    <div class="w-12 h-12 bg-secondary rounded-full border-2 border-white shadow-hard-sm flex items-center justify-center text-2xl shrink-0">
                        🦊
                    </div>
                    <div class="flex-1">
                        <h3 class="font-display text-lg uppercase tracking-tight text-ink">Ana</h3>
                        <p class="text-[10px] font-bold uppercase tracking-widest text-ink/40">Agente • Voto Certero</p>
                    </div>
                    <div class="text-right">
                        <p class="font-display text-xl text-secondary leading-none">+320</p>
                        <p class="text-[8px] font-extrabold uppercase tracking-tighter text-ink/30 mt-1">Total: 1,250</p>
                    </div>
                </div>

                <!-- Rank 3 -->
                <div class="bg-white p-4 rounded-card border-2 border-ink/5 shadow-hard flex items-center gap-4 animate-fade-in" style="animation-delay: 0.2s;">
                    <div class="w-8 h-8 flex items-center justify-center font-display text-lg text-ink/20">3</div>
                    <div class="w-12 h-12 bg-accent rounded-full border-2 border-white shadow-hard-sm flex items-center justify-center text-2xl shrink-0">
                        🤖
                    </div>
                    <div class="flex-1">
                        <h3 class="font-display text-lg uppercase tracking-tight text-ink">Luis</h3>
                        <p class="text-[10px] font-bold uppercase tracking-widest text-ink/40">Agente • Sobrevivió</p>
                    </div>
                    <div class="text-right">
                        <p class="font-display text-xl text-accent leading-none">+150</p>
                        <p class="text-[8px] font-extrabold uppercase tracking-tighter text-ink/30 mt-1">Total: 980</p>
                    </div>
                </div>

                <!-- Rank 4 -->
                <div class="bg-white p-4 rounded-card border-2 border-ink/5 shadow-hard flex items-center gap-4 opacity-60 animate-fade-in" style="animation-delay: 0.3s;">
                    <div class="w-8 h-8 flex items-center justify-center font-display text-lg text-ink/20">4</div>
                    <div class="w-12 h-12 bg-purple rounded-full border-2 border-white shadow-hard-sm flex items-center justify-center text-2xl shrink-0">
                        👾
                    </div>
                    <div class="flex-1">
                        <h3 class="font-display text-lg uppercase tracking-tight text-ink">Sara</h3>
                        <p class="text-[10px] font-bold uppercase tracking-widest text-ink/40">Agente • Fuera</p>
                    </div>
                    <div class="text-right">
                        <p class="font-display text-xl text-ink/20 leading-none">+50</p>
                        <p class="text-[8px] font-extrabold uppercase tracking-tighter text-ink/30 mt-1">Total: 420</p>
                    </div>
                </div>
            </div>

        </main>

        <!-- Footer Action -->
        <footer class="p-6 bg-white border-t border-ink/5 z-20 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] rounded-t-[32px] absolute bottom-0 left-0 right-0">
            <a href="04_Lobby_Tradicional.html" class="w-full block bg-primary text-white font-display text-2xl py-6 rounded-btn shadow-hard-lg active:translate-y-1 transition-all uppercase tracking-widest text-center">
                ¡Otra Partida!
            </a>
        </footer>

    </div>

</body>
</html>
