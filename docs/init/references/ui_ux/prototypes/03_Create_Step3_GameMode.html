<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Sala - Paso 3 - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:wght@200..800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "primary-muted": "#FFF0E5",
                        "secondary": "#4D9DE0",
                        "secondary-muted": "#EBF5FF",
                        "accent": "#87C38F",
                        "accent-muted": "#F0F9F1",
                        "danger": "#E63946",
                        "purple": "#9D4EDD",
                        "purple-muted": "#F5E6FF",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                        "shadow-col": "rgba(43, 45, 66, 0.15)",
                    },
                    fontFamily: {
                        "display": ["Fredoka", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                        "mono": ["Varela Round", "monospace"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.15)',
                        'hard-sm': '2px 2px 0px rgba(43, 45, 66, 0.15)',
                        'hard-lg': '6px 6px 0px rgba(43, 45, 66, 0.15)',
                        'inner-hard': 'inset 3px 3px 0px rgba(0,0,0,0.1)',
                    },
                    borderRadius: {
                        'card': '24px',
                        'btn': '16px',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-dots {
            background-image: radial-gradient(rgba(43, 45, 66, 0.1) 1.5px, transparent 1.5px);
            background-size: 20px 20px;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
        .paper-card { transition: all 0.1s ease; }
        .paper-card:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px rgba(43, 45, 66, 0.15); }
    </style>
</head>
<body class="bg-bg-paper text-ink font-body min-h-screen flex flex-col pattern-dots max-w-md mx-auto shadow-2xl relative overflow-hidden">

    <!-- Stepper Header -->
    <header class="p-6 flex flex-col gap-6">
        <div class="flex items-center justify-between">
            <a href="03_Create_Step2_Category.html" class="w-12 h-12 flex items-center justify-center bg-white rounded-full shadow-hard border-2 border-ink active:translate-y-0.5 active:shadow-none transition-all">
                <span class="material-symbols-outlined text-ink">arrow_back</span>
            </a>
            <div class="flex gap-2">
                <div class="w-8 h-2 bg-accent rounded-full"></div>
                <div class="w-8 h-2 bg-accent rounded-full"></div>
                <div class="w-8 h-2 bg-primary rounded-full"></div>
                <div class="w-8 h-2 bg-ink/5 rounded-full"></div>
            </div>
            <span class="font-display text-primary text-lg">3/4</span>
        </div>
    </header>

    <main class="flex-1 p-6 flex flex-col items-center">
        <div class="text-center mb-10">
            <h2 class="font-display text-4xl mb-2 uppercase tracking-tight leading-none">Modo de Juego</h2>
            <p class="text-xs text-ink/40 font-bold uppercase tracking-widest">¿Cómo será la dinámica?</p>
        </div>

        <div class="w-full space-y-6">
            <!-- Option Tradicional -->
            <label class="block relative cursor-pointer group">
                <input type="radio" name="gamemode" class="peer hidden" checked>
                <div class="bg-white p-6 rounded-card border-4 border-ink/5 shadow-hard peer-checked:border-primary peer-checked:bg-primary-muted transition-all paper-card flex items-center gap-6">
                    <div class="w-16 h-16 bg-primary/10 text-primary rounded-2xl flex items-center justify-center shrink-0 group-hover:rotate-3 transition-transform">
                        <span class="material-symbols-outlined text-4xl">person_search</span>
                    </div>
                    <div>
                        <h3 class="font-display text-xl uppercase leading-none mb-1">Tradicional</h3>
                        <p class="text-[10px] font-bold text-ink/40 uppercase leading-tight">1 Impostor contra todos. El clásico juego de deducción.</p>
                    </div>
                </div>
                <!-- Selection Indicator -->
                <div class="absolute -top-2 -right-2 w-8 h-8 bg-primary text-white rounded-full flex items-center justify-center border-4 border-white shadow-hard-sm opacity-0 peer-checked:opacity-100 transition-opacity">
                    <span class="material-symbols-outlined text-sm">check</span>
                </div>
            </label>

            <!-- Option Cercanas -->
            <label class="block relative cursor-pointer group">
                <input type="radio" name="gamemode" class="peer hidden">
                <div class="bg-white p-6 rounded-card border-4 border-ink/5 shadow-hard peer-checked:border-secondary peer-checked:bg-secondary-muted transition-all paper-card flex items-center gap-6">
                    <div class="w-16 h-16 bg-secondary/10 text-secondary rounded-2xl flex items-center justify-center shrink-0 group-hover:rotate-3 transition-transform">
                        <span class="material-symbols-outlined text-4xl">translate</span>
                    </div>
                    <div>
                        <h3 class="font-display text-xl uppercase leading-none mb-1">Cercanas</h3>
                        <p class="text-[10px] font-bold text-ink/40 uppercase leading-tight">El infiltrado tiene una palabra similar. ¡Sutileza total!</p>
                    </div>
                </div>
                <!-- Selection Indicator -->
                <div class="absolute -top-2 -right-2 w-8 h-8 bg-secondary text-white rounded-full flex items-center justify-center border-4 border-white shadow-hard-sm opacity-0 peer-checked:opacity-100 transition-opacity">
                    <span class="material-symbols-outlined text-sm">check</span>
                </div>
            </label>

            <!-- Option Caos -->
            <label class="block relative cursor-pointer group">
                <input type="radio" name="gamemode" class="peer hidden">
                <div class="bg-white p-6 rounded-card border-4 border-ink/5 shadow-hard peer-checked:border-purple peer-checked:bg-purple-muted transition-all paper-card flex items-center gap-6">
                    <div class="w-16 h-16 bg-purple/10 text-purple rounded-2xl flex items-center justify-center shrink-0 group-hover:rotate-3 transition-transform">
                        <span class="material-symbols-outlined text-4xl">bolt</span>
                    </div>
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <h3 class="font-display text-xl uppercase leading-none">Modo Caos</h3>
                            <span class="bg-purple text-white text-[8px] px-2 py-0.5 rounded-full font-bold uppercase tracking-widest shadow-sm">Online</span>
                        </div>
                        <p class="text-[10px] font-bold text-ink/40 uppercase leading-tight">Vinculados vs Dispersos. Encuentren su pareja en secreto.</p>
                    </div>
                </div>
                <!-- Selection Indicator -->
                <div class="absolute -top-2 -right-2 w-8 h-8 bg-purple text-white rounded-full flex items-center justify-center border-4 border-white shadow-hard-sm opacity-0 peer-checked:opacity-100 transition-opacity">
                    <span class="material-symbols-outlined text-sm">check</span>
                </div>
            </label>
        </div>
    </main>

    <footer class="p-6 pb-10">
        <a href="03_Create_Step4_FinalConfig.html" class="w-full block bg-primary text-white font-display text-2xl py-6 rounded-btn shadow-hard-lg active:translate-y-1 active:shadow-none transition-all uppercase tracking-widest text-center">
            Siguiente
        </a>
    </footer>

</body>
</html>
