<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pistas - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "primary-muted": "#FFF0E5",
                        "secondary": "#4D9DE0",
                        "secondary-muted": "#EBF5FF",
                        "accent": "#87C38F",
                        "accent-muted": "#F0F9F1",
                        "danger": "#E63946",
                        "danger-muted": "#FFF0F1",
                        "purple": "#9D4EDD",
                        "purple-muted": "#F5E6FF",
                        "ink": "#2B2D42",
                        "ink-muted": "#8D8FA1",
                        "bg-paper": "#FDFBF7",
                        "shadow-col": "rgba(43, 45, 66, 0.15)",
                        "sticky-yellow": "#FFD166",
                    },
                    fontFamily: {
                        "display": ["Fredoka One", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                        "mono": ["Varela Round", "monospace"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.15)',
                        'hard-sm': '2px 2px 0px rgba(43, 45, 66, 0.15)',
                        'hard-lg': '6px 6px 0px rgba(43, 45, 66, 0.15)',
                        'inner-hard': 'inset 3px 3px 0px rgba(0,0,0,0.1)',
                    },
                    borderRadius: {
                        'card': '24px',
                        'btn': '16px',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-dots {
            background-image: radial-gradient(rgba(43, 45, 66, 0.1) 1.5px, transparent 1.5px);
            background-size: 20px 20px;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .bubble-left::before {
            content: ''; position: absolute; left: -8px; top: 12px; width: 0; height: 0;
            border-top: 8px solid transparent; border-bottom: 8px solid transparent; 
            border-right: 8px solid white; filter: drop-shadow(-2px 2px 0px rgba(43, 45, 66, 0.15));
        }

        @keyframes countdown {
            from { width: 100%; }
            to { width: 0%; }
        }
        .animate-countdown {
            animation: countdown 45s linear forwards;
        }
    </style>
</head>
<body class="bg-bg-paper text-ink font-body min-h-screen flex flex-col pattern-dots max-w-md mx-auto shadow-2xl overflow-hidden relative">

    <!-- Header -->
    <header class="p-6 bg-white border-b border-ink/5 flex items-center justify-between shadow-[0_4px_20px_rgba(43,45,66,0.05)] sticky top-0 z-30">
        <div class="flex flex-col">
            <span class="font-display text-primary text-xl leading-none uppercase">Ronda 1</span>
            <span class="text-[10px] font-extrabold uppercase opacity-40 tracking-[0.2em] mt-1">Fase de Pistas</span>
        </div>
        <div class="flex items-center gap-3">
            <div class="bg-secondary-muted px-4 py-2 rounded-full border-2 border-secondary/10 flex items-center gap-2">
                <span class="material-symbols-outlined text-secondary text-sm">timer</span>
                <span class="font-mono font-bold text-secondary text-sm">00:45</span>
            </div>
        </div>
    </header>

    <!-- Turn Indicator & Progress Bar -->
    <div class="bg-white/80 backdrop-blur-sm p-4 border-b border-ink/5 flex flex-col items-center gap-2">
        <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-ink/40">Turno de: <span class="text-secondary">Ana</span></p>
        <!-- Thin Time Bar -->
        <div class="w-48 h-1.5 bg-ink/5 rounded-full overflow-hidden">
            <div class="h-full bg-secondary animate-countdown"></div>
        </div>
    </div>

    <!-- Chat Area -->
    <main class="flex-1 p-6 space-y-6 overflow-y-auto no-scrollbar">
        <!-- Message from others -->
        <div class="flex items-start gap-3 animate-fade-in">
            <div class="w-10 h-10 bg-primary rounded-full border-2 border-white shadow-hard-sm flex items-center justify-center text-xl shrink-0">
                🐱
            </div>
            <div class="relative bg-white p-4 rounded-btn shadow-hard border border-ink/5 bubble-left">
                <p class="font-bold text-primary text-[10px] uppercase tracking-wider mb-1">Bruno</p>
                <p class="text-sm leading-relaxed">Es algo que se puede comer a cualquier hora y a todos les gusta.</p>
            </div>
        </div>

        <!-- System Message -->
        <div class="flex flex-col items-center py-4">
            <div class="bg-yellow-muted border-2 border-dashed border-sticky-yellow px-6 py-2 rounded-full text-[10px] font-bold uppercase tracking-[0.2em] text-ink/40">
                Ana está escribiendo...
            </div>
        </div>
    </main>

    <!-- Sticky Word Reminder -->
    <div class="px-6 mb-4">
        <div class="bg-white p-4 rounded-card border-2 border-accent/20 shadow-hard flex items-center justify-between group overflow-hidden relative">
            <div class="absolute inset-0 bg-accent/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
            <div class="flex items-center gap-4 relative z-10">
                <div class="w-10 h-10 bg-accent rounded-full flex items-center justify-center text-white shadow-hard-sm">
                    <span class="material-symbols-outlined text-xl">visibility</span>
                </div>
                <div>
                    <p class="text-[8px] font-extrabold uppercase tracking-[0.3em] text-accent">Tu Palabra Secreta</p>
                    <p class="font-display text-2xl text-ink leading-none uppercase tracking-tight">PIZZA</p>
                </div>
            </div>
            <span class="material-symbols-outlined text-accent/20 text-4xl transform -rotate-12">restaurant</span>
        </div>
    </div>

    <!-- Input Area (Host/Player State) -->
    <footer class="p-6 bg-white border-t border-ink/5 shadow-[0_-4px_20px_rgba(43,45,66,0.05)] rounded-t-[32px]">
        <div class="bg-ink/5 border-2 border-dashed border-ink/10 p-6 rounded-btn flex flex-col items-center justify-center gap-2 opacity-60">
            <span class="material-symbols-outlined text-ink/20 text-3xl">hourglass_bottom</span>
            <p class="font-bold uppercase tracking-widest text-[10px] text-ink/40 text-center">Espera tu turno para enviar tu pista</p>
        </div>
    </footer>

</body>
</html>
