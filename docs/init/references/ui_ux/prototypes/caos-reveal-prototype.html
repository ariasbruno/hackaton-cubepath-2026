<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vínculo Expuesto - El Impostor</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:wght@200..800&family=Varela+Round&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "secondary": "#4D9DE0",
                        "accent": "#87C38F",
                        "danger": "#E63946",
                        "purple": "#9D4EDD",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                    },
                    fontFamily: {
                        "display": ["Fredoka", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.15)',
                        'hard-sm': '2px 2px 0px rgba(43, 45, 66, 0.3)',
                        'hard-lg': '8px 8px 0px rgba(43, 45, 66, 0.3)',
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-dots {
            background-image: radial-gradient(rgba(43, 45, 66, 0.1) 1.5px, transparent 1.5px);
            background-size: 20px 20px;
        }

        .delay-0 {
            animation-delay: 0ms;
        }

        .delay-200 {
            animation-delay: 200ms;
        }
    </style>
</head>

<body
    class="bg-[#7F1D1D] text-white font-body min-h-screen w-screen relative overflow-hidden flex flex-col items-center justify-center p-6 text-center">

    <!-- Pattern and Decor -->
    <div class="absolute inset-0 pattern-dots pointer-events-none"></div>
    <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[150%] h-[50%] bg-red-600/20 blur-[120px] -rotate-12 pointer-events-none">
    </div>

    <main class="relative z-10 space-y-10 animate-fade-in w-full max-w-lg">

        <!-- Headers -->
        <div class="space-y-2">
            <div
                class="inline-flex items-center gap-2 px-4 py-1.5 bg-white/10 rounded-full backdrop-blur-md border border-white/10 mb-4 scale-90">
                <span class="material-symbols-outlined text-red-300 text-sm">gavel</span>
                <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-red-200">Pareja Descubierta</span>
            </div>

            <h1
                class="font-display font-bold text-5xl md:text-6xl italic leading-none uppercase tracking-tighter drop-shadow-2xl">
                ¡VÍNCULO <br />
                <span class="text-red-300 drop-shadow-[0_0_20px_rgba(239,68,68,0.5)]">EXPUESTO!</span>
            </h1>
        </div>

        <!-- Avatars grid -->
        <div class="grid grid-cols-2 gap-8 relative py-8">
            <!-- Player 1 -->
            <div class="flex flex-col items-center gap-4 animate-fade-in-up delay-0 opacity-0"
                style="animation-fill-mode: forwards;">
                <div class="relative">
                    <div class="w-24 h-24 md:w-28 md:h-28 rounded-full overflow-hidden flex items-center justify-center border-4 border-white shadow-hard scale-110"
                        style="background-color: #FFD166;">
                        <span class="text-6xl">🐻</span>
                    </div>
                    <!-- Elimination badge -->
                    <div
                        class="absolute -bottom-2 -right-2 w-8 h-8 bg-red-500 rounded-full flex items-center justify-center border-4 border-[#7F1D1D] shadow-hard-sm">
                        <span class="material-symbols-outlined text-white text-sm font-bold">close</span>
                    </div>
                </div>
                <h3 class="font-display text-xl uppercase tracking-wider">Bruno</h3>
            </div>

            <!-- Player 2 -->
            <div class="flex flex-col items-center gap-4 animate-fade-in-up delay-200 opacity-0"
                style="animation-fill-mode: forwards;">
                <div class="relative">
                    <div class="w-24 h-24 md:w-28 md:h-28 rounded-full overflow-hidden flex items-center justify-center border-4 border-white shadow-hard scale-110"
                        style="background-color: #118AB2;">
                        <span class="text-6xl">🐱</span>
                    </div>
                    <!-- Elimination badge -->
                    <div
                        class="absolute -bottom-2 -right-2 w-8 h-8 bg-red-500 rounded-full flex items-center justify-center border-4 border-[#7F1D1D] shadow-hard-sm">
                        <span class="material-symbols-outlined text-white text-sm font-bold">close</span>
                    </div>
                </div>
                <h3 class="font-display text-xl uppercase tracking-wider">Ana</h3>
            </div>

            <!-- Link Visual (X in the background) -->
            <div
                class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-32 h-1 bg-gradient-to-r from-transparent via-red-300 to-transparent blur-sm rotate-45 -z-10">
            </div>
            <div
                class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-32 h-1 bg-gradient-to-r from-transparent via-red-300 to-transparent blur-sm -rotate-45 -z-10">
            </div>
        </div>

        <!-- Secret Word -->
        <div class="bg-black/20 backdrop-blur-xl rounded-[2rem] p-6 border-4 border-red-500/30 shadow-hard-lg">
            <p class="text-[10px] uppercase font-black tracking-[0.3em] text-red-300 leading-none mb-4 opacity-70">La
                palabra secreta era</p>
            <h2
                class="text-4xl md:text-5xl font-display font-bold uppercase italic tracking-widest text-white drop-shadow-2xl">
                Computadora</h2>
        </div>

        <!-- Footer Text -->
        <p class="text-sm font-medium text-red-200/60 leading-relaxed px-8 pt-4">
            Los agentes han triunfado en el Caos. <br />
            La conexión fue destruida.
        </p>

        <!-- Loading spinner mimicking network -->
        <div class="pt-4 opacity-40">
            <div class="flex items-center justify-center gap-3 text-red-200">
                <div class="w-4 h-4 border-2 border-red-200 border-t-transparent rounded-full animate-spin"></div>
                <p class="font-mono uppercase tracking-[0.3em] text-[10px] font-black">Finalizando juego...</p>
            </div>
        </div>

    </main>
</body>

</html>
