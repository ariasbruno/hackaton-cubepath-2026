<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revelar Rol - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "primary-muted": "#FFF0E5",
                        "secondary": "#4D9DE0",
                        "accent": "#87C38F",
                        "accent-muted": "#F0F9F1",
                        "danger": "#E63946",
                        "danger-muted": "#FFF0F1",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                        "shadow-col": "rgba(43, 45, 66, 0.15)",
                    },
                    fontFamily: {
                        "display": ["Fredoka One", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.15)',
                        'hard-lg': '6px 6px 0px rgba(43, 45, 66, 0.15)',
                        'inner-hard': 'inset 3px 3px 0px rgba(0,0,0,0.1)',
                    },
                    borderRadius: {
                        'card': '24px',
                        'btn': '16px',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-dots {
            background-image: radial-gradient(rgba(43, 45, 66, 0.1) 1.5px, transparent 1.5px);
            background-size: 20px 20px;
        }
        .pattern-checkers {
            background-image: repeating-linear-gradient(45deg, rgba(43, 45, 66, 0.05) 25px, transparent 25px, transparent 50px, rgba(43, 45, 66, 0.05) 50px, rgba(43, 45, 66, 0.05) 75px, transparent 75px, transparent 100px);
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
        
        @keyframes countdown {
            from { width: 100%; }
            to { width: 0%; }
        }
        .animate-countdown {
            animation: countdown 10s linear forwards;
        }

        /* CARD FLIP LOGIC */
        .perspective-1000 { perspective: 1000px; }
        .card-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .card-flipped { transform: rotateY(180deg); }
        .card-front, .card-back {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .card-back { transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-bg-paper text-ink font-body min-h-screen flex flex-col items-center justify-center p-6 text-center pattern-dots max-w-md mx-auto shadow-2xl overflow-hidden relative">

    <main class="flex-1 flex flex-col items-center justify-center space-y-12 w-full animate-fade-in">
        
        <div class="space-y-2">
            <h1 class="font-display text-3xl uppercase tracking-tighter text-ink/40">Hola, <span class="text-ink">BRUNO</span></h1>
            <p class="text-xs font-bold uppercase tracking-[0.2em] text-ink/20">Toca la carta para ver tu rol</p>
        </div>

        <!-- 3D Flipping Card -->
        <div class="relative w-72 h-96 perspective-1000 cursor-pointer group" onclick="this.querySelector('.card-inner').classList.toggle('card-flipped')">
            <div class="card-inner relative w-full h-full shadow-hard-lg rounded-card">
                
                <!-- Front (Hidden State) -->
                <div class="card-front absolute inset-0 bg-primary rounded-card border-8 border-white flex flex-col items-center justify-center text-white overflow-hidden">
                    <div class="absolute inset-0 pattern-checkers opacity-20"></div>
                    <div class="absolute inset-4 border-2 border-white/40 border-dashed rounded-[16px]"></div>
                    <span class="material-symbols-outlined text-8xl mb-4 drop-shadow-md">question_mark</span>
                    <p class="font-display text-2xl uppercase tracking-widest drop-shadow-md">Tocar para<br/>Revelar</p>
                </div>

                <!-- Back (Role State) -->
                <div class="card-back absolute inset-0 bg-white rounded-card border-8 border-accent flex flex-col items-center justify-center p-6">
                    <div class="absolute inset-0 pattern-dots opacity-5"></div>
                    <div class="w-20 h-20 bg-accent/10 text-accent rounded-full flex items-center justify-center mb-6">
                        <span class="material-symbols-outlined text-5xl">person</span>
                    </div>
                    <h2 class="font-display text-4xl text-accent uppercase leading-none mb-2">AGENTE</h2>
                    <div class="w-full h-0.5 bg-accent/10 my-4"></div>
                    <p class="text-ink/40 text-[10px] font-bold uppercase mb-1">Tu Palabra:</p>
                    <h3 class="font-display text-5xl text-ink uppercase tracking-widest">PIZZA</h3>
                    <p class="mt-8 text-ink/40 text-[8px] font-bold uppercase tracking-widest">Toca de nuevo para ocultar</p>
                </div>

            </div>
            <!-- Decorative Stack -->
            <div class="absolute top-2 left-2 w-full h-full bg-black/5 rounded-card -z-10 rotate-2"></div>
        </div>

        <div class="w-full max-w-xs space-y-4">
            <p class="text-ink/40 font-bold uppercase tracking-[0.3em] text-[10px] animate-pulse">Memorizando palabra...</p>
            <!-- Thin Time Bar -->
            <div class="w-full h-1.5 bg-ink/5 rounded-full overflow-hidden">
                <div class="h-full bg-primary animate-countdown"></div>
            </div>
        </div>

    </main>

    <footer class="p-6 w-full">
        <a href="05_Local_PassPhone.html" class="w-full block bg-ink text-white font-display text-2xl py-6 rounded-btn shadow-hard active:translate-y-1 transition-all uppercase tracking-widest text-center">
            Listo, pasar móvil
        </a>
    </footer>

</body>
</html>
