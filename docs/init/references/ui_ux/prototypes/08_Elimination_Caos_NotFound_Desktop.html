<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinculados NO Descubiertos (Desktop) - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "primary-muted": "#FFF0E5",
                        "secondary": "#4D9DE0",
                        "accent": "#87C38F",
                        "danger": "#E63946",
                        "purple": "#9D4EDD",
                        "purple-muted": "#F5E6FF",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                        "shadow-col": "rgba(43, 45, 66, 0.3)",
                    },
                    fontFamily: {
                        "display": ["Fredoka One", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                        "mono": ["Varela Round", "monospace"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.3)',
                        'hard-sm': '2px 2px 0px rgba(43, 45, 66, 0.2)',
                        'hard-lg': '12px 12px 0px rgba(43, 45, 66, 0.4)',
                    },
                    borderRadius: {
                        'card': '32px',
                        'btn': '24px',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-checkers {
            background-image: repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.08) 50px, transparent 50px, transparent 100px, rgba(255, 255, 255, 0.08) 100px, rgba(255, 255, 255, 0.08) 150px, transparent 150px, transparent 200px);
            background-size: 400px 400px;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
        
        @keyframes countdown {
            from { width: 100%; }
            to { width: 0%; }
        }
        .animate-countdown {
            animation: countdown 5s linear forwards;
        }

        .glow-purple {
            background: radial-gradient(circle at center, rgba(157, 78, 221, 0.4) 0%, transparent 75%);
        }

        @keyframes drift {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(20px, -20px) rotate(2deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .animate-drift { animation: drift 10s ease-in-out infinite; }
    </style>
</head>
<body class="bg-purple text-white font-body min-h-screen flex flex-col items-center justify-center pattern-checkers overflow-hidden relative">

    <div class="absolute inset-0 glow-purple z-0"></div>

    <main class="w-full max-w-6xl flex flex-col items-center justify-center space-y-20 relative z-10 py-20">
        
        <div class="text-center space-y-8 relative animate-drift">
            <div class="absolute inset-0 bg-white/10 blur-3xl rounded-full scale-150 animate-pulse"></div>
            <h1 class="font-display text-8xl md:text-9xl drop-shadow-[0_10px_10px_rgba(0,0,0,0.5)] leading-none uppercase tracking-tighter text-white rotate-[-2deg] italic">
                SIGUEN EN<br/><span class="text-white/90">EL CAOS</span>
            </h1>
            <p class="text-white font-black uppercase tracking-[1em] text-xl">Identidades aún protegidas por la duda</p>
        </div>

        <!-- Mystery Panel (XL) -->
        <div class="w-full max-w-4xl relative">
            <div class="bg-white/10 backdrop-blur-xl p-20 rounded-card border-8 border-dashed border-white/20 relative overflow-hidden transform hover:scale-[1.02] transition-transform duration-500 shadow-hard-lg">
                 <div class="absolute inset-0 bg-white/5 pattern-checkers opacity-20"></div>
                 
                 <div class="relative z-10 flex flex-col items-center">
                    <span class="material-symbols-outlined text-[200px] text-white/20 mb-12 animate-pulse">visibility_off</span>
                    
                    <h2 class="font-display text-6xl uppercase tracking-[0.2em] text-white mb-6">SIN ACUSACIONES</h2>
                    <div class="h-1 w-64 bg-white/20 rounded-full mb-8"></div>
                    <p class="text-white/40 font-black uppercase tracking-[0.4em] text-xl text-center">La pareja vinculada ha logrado evadir el radar</p>
                 </div>

                 <!-- Decorative corners -->
                 <div class="absolute top-8 left-8 w-16 h-16 border-t-8 border-l-8 border-white/10 rounded-tl-2xl"></div>
                 <div class="absolute top-8 right-8 w-16 h-16 border-t-8 border-r-8 border-white/10 rounded-tr-2xl"></div>
                 <div class="absolute bottom-8 left-8 w-16 h-16 border-b-8 border-l-8 border-white/10 rounded-bl-2xl"></div>
                 <div class="absolute bottom-8 right-8 w-16 h-16 border-b-8 border-r-8 border-white/10 rounded-br-2xl"></div>
            </div>
        </div>

        <div class="w-full max-w-2xl space-y-8">
            <div class="flex items-center justify-between text-white/60 font-black uppercase tracking-widest text-sm">
                <span>Estado: Siguiente Fase</span>
                <span>Prioridad: Continuación de Debate</span>
            </div>
            <!-- Robust Time Bar -->
            <div class="w-full h-6 bg-white/10 rounded-full overflow-hidden border-2 border-white/10 shadow-inner-hard p-1">
                <div class="h-full bg-white rounded-full animate-countdown shadow-[0_0_20px_rgba(255,255,255,0.5)]"></div>
            </div>
            <p class="text-white font-black uppercase tracking-[0.5em] text-sm text-center animate-pulse italic">Iniciando siguiente ronda de pistas...</p>
        </div>
    </main>

    <!-- Action Footer -->
    <footer class="w-full max-w-6xl px-10 pb-16 z-20">
        <a href="06_Pistas_Desktop.html" class="w-full block bg-white text-purple font-display text-4xl py-10 rounded-btn shadow-hard-lg hover:translate-y-[-4px] active:translate-y-4 active:shadow-none transition-all uppercase tracking-[0.2em] text-center border-4 border-ink">
            Continuar Juego
        </a>
    </footer>

</body>
</html>
