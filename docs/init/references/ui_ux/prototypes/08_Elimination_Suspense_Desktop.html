<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suspenso Eliminación (Desktop) - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "primary-muted": "#FFF0E5",
                        "secondary": "#4D9DE0",
                        "accent": "#87C38F",
                        "danger": "#E63946",
                        "danger-muted": "#FFF0F1",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                        "shadow-col": "rgba(43, 45, 66, 0.3)",
                    },
                    fontFamily: {
                        "display": ["Fredoka One", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                        "mono": ["Varela Round", "monospace"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.3)',
                        'hard-sm': '2px 2px 0px rgba(43, 45, 66, 0.2)',
                        'hard-lg': '12px 12px 0px rgba(43, 45, 66, 0.4)',
                    },
                    borderRadius: {
                        'card': '32px',
                        'btn': '24px',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-checkers {
            background-image: repeating-linear-gradient(45deg, rgba(0, 0, 0, 0.15) 50px, transparent 50px, transparent 100px, rgba(0, 0, 0, 0.15) 100px, rgba(0, 0, 0, 0.15) 150px, transparent 150px, transparent 200px);
            background-size: 400px 400px;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
        
        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        .animate-heartbeat { animation: heartbeat 0.8s infinite cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes countdown {
            from { width: 100%; }
            to { width: 0%; }
        }
        .animate-countdown {
            animation: countdown 5s linear forwards;
        }
        
        .spotlight {
            background: radial-gradient(circle at center, transparent 0%, rgba(43, 45, 66, 0.95) 75%);
        }

        @keyframes scan {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(100%); opacity: 0; }
        }
        .scan-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: rgba(230, 57, 70, 0.5);
            box-shadow: 0 0 20px rgba(230, 57, 70, 1);
            animation: scan 2s linear infinite;
            z-index: 20;
        }
    </style>
</head>
<body class="bg-ink text-white font-body min-h-screen flex flex-col items-center justify-center pattern-checkers overflow-hidden relative">

    <div class="absolute inset-0 spotlight z-0"></div>

    <main class="w-full max-w-6xl flex flex-col items-center justify-center space-y-20 relative z-10 py-20">
        
        <div class="text-center space-y-6">
            <h1 class="font-display text-8xl md:text-9xl drop-shadow-[0_10px_10px_rgba(0,0,0,0.5)] leading-none uppercase tracking-tighter text-danger animate-pulse italic">
                ¿ELIMINADO?
            </h1>
            <p class="text-white/40 font-black uppercase tracking-[1em] text-xl">Calculando consenso de la mesa</p>
        </div>

        <!-- The Target Card (XL) -->
        <div class="relative group">
            <!-- Massive Pulse rings -->
            <div class="absolute -inset-20 bg-danger/10 rounded-full scale-150 animate-ping opacity-30"></div>
            <div class="absolute -inset-10 bg-danger/20 rounded-full scale-125 animate-ping opacity-50" style="animation-delay: 0.5s"></div>
            
            <div class="bg-white text-ink p-16 rounded-card border-8 border-ink shadow-hard-lg relative z-10 animate-heartbeat max-w-xl">
                <div class="scan-line"></div>
                
                <div class="w-64 h-64 bg-primary rounded-full border-8 border-ink shadow-hard flex items-center justify-center mx-auto mb-12 relative overflow-hidden group-hover:rotate-3 transition-transform duration-500">
                    <span class="text-9xl">🐱</span>
                    <!-- Target Overlay -->
                    <div class="absolute inset-0 flex items-center justify-center bg-danger/20 backdrop-blur-[2px]">
                        <span class="material-symbols-outlined text-white text-9xl opacity-90 scale-110">target</span>
                    </div>
                </div>
                
                <div class="text-center">
                    <h2 class="font-display text-8xl mb-4 uppercase tracking-tighter text-ink leading-none">BRUNO</h2>
                    <div class="flex items-center justify-center gap-6">
                        <div class="h-1 flex-1 bg-ink/10 rounded-full"></div>
                        <div class="bg-danger text-white px-10 py-4 rounded-full font-display text-4xl shadow-hard border-4 border-ink uppercase italic rotate-[-3deg] hover:rotate-0 transition-transform cursor-default">
                            4 VOTOS
                        </div>
                        <div class="h-1 flex-1 bg-ink/10 rounded-full"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full max-w-2xl space-y-8">
            <div class="flex items-center justify-between text-white/60 font-black uppercase tracking-widest text-sm">
                <span>Estado: Analizando Perfil</span>
                <span>Prioridad: Máxima</span>
            </div>
            <!-- Robust Time Bar -->
            <div class="w-full h-6 bg-white/5 rounded-full overflow-hidden border-2 border-white/10 shadow-inner-hard p-1">
                <div class="h-full bg-danger rounded-full animate-countdown shadow-[0_0_20px_rgba(230,57,70,0.5)]"></div>
            </div>
            <p class="text-white font-black uppercase tracking-[0.5em] text-sm text-center animate-pulse">Revelación inminente...</p>
        </div>
    </main>

    <!-- Dev Links Navigation -->
    <footer class="absolute bottom-10 left-0 right-0 px-10 flex justify-center gap-10 opacity-10 hover:opacity-100 transition-opacity z-20">
        <a href="08_Elimination_Agente_Desktop.html" class="bg-white/10 border-2 border-white/20 text-white/60 px-6 py-2 rounded-full font-bold uppercase text-[10px] tracking-widest hover:bg-white hover:text-ink transition-colors">Test: Inocente</a>
        <a href="08_Elimination_Impostor_Desktop.html" class="bg-white/10 border-2 border-white/20 text-white/60 px-6 py-2 rounded-full font-bold uppercase text-[10px] tracking-widest hover:bg-white hover:text-ink transition-colors">Test: Impostor</a>
        <a href="08_Elimination_Infiltrado_Desktop.html" class="bg-white/10 border-2 border-white/20 text-white/60 px-6 py-2 rounded-full font-bold uppercase text-[10px] tracking-widest hover:bg-white hover:text-ink transition-colors">Test: Infiltrado</a>
    </footer>

</body>
</html>
