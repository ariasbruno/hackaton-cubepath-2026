<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Impostor Eliminado! (Desktop) - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "primary-muted": "#FFF0E5",
                        "secondary": "#4D9DE0",
                        "accent": "#87C38F",
                        "danger": "#E63946",
                        "danger-muted": "#FFF0F1",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                        "shadow-col": "rgba(43, 45, 66, 0.3)",
                        "sticky-yellow": "#FFD166",
                    },
                    fontFamily: {
                        "display": ["Fredoka One", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                        "mono": ["Varela Round", "monospace"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.3)',
                        'hard-sm': '2px 2px 0px rgba(43, 45, 66, 0.2)',
                        'hard-lg': '12px 12px 0px rgba(43, 45, 66, 0.4)',
                    },
                    borderRadius: {
                        'card': '32px',
                        'btn': '24px',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-checkers {
            background-image: repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.08) 50px, transparent 50px, transparent 100px, rgba(255, 255, 255, 0.08) 100px, rgba(255, 255, 255, 0.08) 150px, transparent 150px, transparent 200px);
            background-size: 400px 400px;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
        
        @keyframes countdown {
            from { width: 100%; }
            to { width: 0%; }
        }
        .animate-countdown {
            animation: countdown 10s linear forwards;
        }
        
        .confetti {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #FFD166;
            animation: confetti-fall 6s linear infinite;
            z-index: 0;
            border-radius: 4px;
        }
        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 1; }
            50% { transform: translateY(50vh) rotate(360deg) translateX(50px); opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(720deg) translateX(-50px); opacity: 0; }
        }

        .victory-glow {
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.3) 0%, transparent 70%);
        }
    </style>
</head>
<body class="bg-accent text-white font-body min-h-screen flex flex-col items-center justify-center pattern-checkers overflow-hidden relative">

    <div class="absolute inset-0 victory-glow z-0"></div>

    <!-- Confetti particles (Scaled up for Desktop) -->
    <div class="absolute inset-0 pointer-events-none overflow-hidden">
        <div class="confetti" style="left: 10%; animation-delay: 0.2s; background-color: white;"></div>
        <div class="confetti" style="left: 25%; animation-delay: 1.5s; background-color: #FF8C42; width: 15px; height: 15px;"></div>
        <div class="confetti" style="left: 40%; animation-delay: 0.8s; background-color: #FFF; width: 25px; height: 25px;"></div>
        <div class="confetti" style="left: 55%; animation-delay: 2.5s; background-color: #FFD166;"></div>
        <div class="confetti" style="left: 70%; animation-delay: 0.5s; background-color: white; width: 12px; height: 12px;"></div>
        <div class="confetti" style="left: 85%; animation-delay: 1.8s; background-color: #FF8C42;"></div>
        <div class="confetti" style="left: 95%; animation-delay: 3.2s; background-color: white;"></div>
        
        <div class="confetti" style="left: 15%; animation-delay: 4.2s; background-color: #FFD166;"></div>
        <div class="confetti" style="left: 45%; animation-delay: 5.5s; background-color: white;"></div>
    </div>

    <main class="w-full max-w-6xl flex flex-col items-center justify-center space-y-20 relative z-10 py-20">
        
        <div class="text-center space-y-8 relative">
            <div class="absolute inset-0 bg-white/20 blur-3xl rounded-full scale-150 animate-pulse"></div>
            <h1 class="font-display text-8xl md:text-9xl drop-shadow-[0_10px_10px_rgba(0,0,0,0.3)] leading-none uppercase tracking-tighter text-white rotate-[-3deg] italic">
                ¡IMPOSTOR<br/><span class="text-white/90">ATRAPADO!</span>
            </h1>
            <p class="text-white font-black uppercase tracking-[1em] text-xl">Misión cumplida: Amenaza neutralizada</p>
        </div>

        <!-- Victim Card (XL) -->
        <div class="relative group">
            <div class="bg-white text-ink p-16 rounded-card border-8 border-ink shadow-hard-lg relative z-10 max-w-2xl transform hover:scale-[1.05] transition-transform duration-500">
                <div class="w-64 h-64 bg-danger/10 rounded-full border-8 border-danger/20 flex items-center justify-center mx-auto mb-12 relative overflow-hidden group-hover:rotate-12 transition-transform">
                    <span class="text-9xl">🦊</span>
                    <div class="absolute -top-4 -right-4 bg-danger text-white p-6 rounded-2xl shadow-hard border-4 border-ink rotate-[-12deg]">
                        <span class="material-symbols-outlined text-6xl">skull</span>
                    </div>
                </div>
                
                <div class="text-center">
                    <h2 class="font-display text-8xl mb-4 uppercase tracking-tighter text-ink leading-none">BRUNO</h2>
                    <p class="text-ink/30 text-xl font-black uppercase tracking-[0.4em] mb-12">Era el Impostor</p>
                    
                    <div class="bg-sticky-yellow text-ink px-12 py-6 rounded-btn shadow-hard-lg border-4 border-ink rotate-2 inline-block hover:rotate-0 transition-transform">
                        <div class="flex items-center gap-6">
                            <span class="material-symbols-outlined text-5xl">military_tech</span>
                            <span class="font-display text-4xl uppercase tracking-tighter">+100 PTS</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Floating Decorative Elements (XL) -->
            <div class="absolute -top-12 -right-12 bg-primary text-white p-6 rounded-full shadow-hard border-4 border-white rotate-12 animate-bounce">
                <span class="material-symbols-outlined text-5xl">stars</span>
            </div>
            <div class="absolute -bottom-10 -left-10 bg-secondary text-white p-6 rounded-full shadow-hard border-4 border-white rotate-[-12deg] animate-pulse">
                <span class="material-symbols-outlined text-5xl">emoji_events</span>
            </div>
        </div>

        <div class="w-full max-w-3xl space-y-8">
            <div class="bg-white/10 backdrop-blur-md p-10 rounded-card border-4 border-white/20 shadow-hard-lg">
                <p class="text-white font-display text-5xl uppercase tracking-widest text-center italic">¡VICTORIA AGENTE!</p>
            </div>
            
            <div class="flex flex-col items-center gap-4">
                <p class="text-white/80 font-black uppercase tracking-[0.5em] text-sm animate-pulse">Sincronizando tabla de puntuaciones...</p>
                <!-- Robust Time Bar -->
                <div class="w-full h-6 bg-white/20 rounded-full overflow-hidden border-2 border-white/10 shadow-inner-hard p-1">
                    <div class="h-full bg-white rounded-full animate-countdown shadow-[0_0_20px_rgba(255,255,255,0.5)]"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Action Footer -->
    <footer class="w-full max-w-6xl px-10 pb-16 z-20">
        <a href="09_Results_AgentesWin_Desktop.html" class="w-full block bg-white text-accent font-display text-4xl py-10 rounded-btn shadow-hard-lg hover:translate-y-[-4px] active:translate-y-4 active:shadow-none transition-all uppercase tracking-[0.2em] text-center border-4 border-ink">
            Ver Resultados
        </a>
    </footer>

</body>
</html>
