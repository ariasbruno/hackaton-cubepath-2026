<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Impostor Eliminado! - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "primary-muted": "#FFF0E5",
                        "secondary": "#4D9DE0",
                        "accent": "#87C38F",
                        "danger": "#E63946",
                        "danger-muted": "#FFF0F1",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                        "shadow-col": "rgba(43, 45, 66, 0.15)",
                        "sticky-yellow": "#FFD166",
                    },
                    fontFamily: {
                        "display": ["Fredoka One", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.15)',
                        'hard-sm': '2px 2px 0px rgba(43, 45, 66, 0.15)',
                        'hard-lg': '6px 6px 0px rgba(43, 45, 66, 0.15)',
                        'inner-hard': 'inset 3px 3px 0px rgba(0,0,0,0.1)',
                    },
                    borderRadius: {
                        'card': '24px',
                        'btn': '16px',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-checkers {
            background-image: repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.05) 25px, transparent 25px, transparent 50px, rgba(255, 255, 255, 0.05) 50px, rgba(255, 255, 255, 0.05) 75px, transparent 75px, transparent 100px);
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
        
        @keyframes countdown {
            from { width: 100%; }
            to { width: 0%; }
        }
        .animate-countdown {
            animation: countdown 10s linear forwards;
        }
        
        .confetti {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #FFD166;
            animation: confetti-fall 4s linear infinite;
            z-index: 0;
        }
        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body class="bg-accent text-white font-body min-h-screen flex flex-col items-center justify-center p-6 text-center pattern-checkers max-w-md mx-auto shadow-2xl overflow-hidden relative">

    <!-- Confetti particles -->
    <div class="absolute inset-0 pointer-events-none">
        <div class="confetti" style="left: 15%; animation-delay: 0.2s; background-color: white;"></div>
        <div class="confetti" style="left: 30%; animation-delay: 1.2s; background-color: #FF8C42;"></div>
        <div class="confetti" style="left: 45%; animation-delay: 0.5s; background-color: #FFF;"></div>
        <div class="confetti" style="left: 60%; animation-delay: 2.1s; background-color: #FFD166;"></div>
        <div class="confetti" style="left: 85%; animation-delay: 0.8s; background-color: white;"></div>
    </div>

    <main class="flex-1 flex flex-col items-center justify-center space-y-12 w-full animate-fade-in relative z-10">
        <div class="relative w-full">
            <div class="absolute inset-0 bg-white/20 blur-3xl rounded-full scale-110 animate-pulse"></div>
            <h1 class="font-display text-5xl md:text-6xl drop-shadow-lg leading-tight rotate-[-2deg] uppercase">¡IMPOSTOR<br/>ATRAPADO!</h1>
        </div>

        <!-- The Victim Card -->
        <div class="relative w-full max-w-xs">
            <div class="bg-white text-ink p-8 rounded-card border-4 border-ink shadow-hard-lg relative z-10">
                <div class="w-24 h-24 bg-danger/10 rounded-full border-4 border-danger/20 flex items-center justify-center mx-auto mb-6 relative">
                    <span class="text-6xl">🦊</span>
                    <div class="absolute -top-2 -right-2 bg-danger text-white p-1 rounded-md shadow-hard-sm">
                        <span class="material-symbols-outlined text-sm">skull</span>
                    </div>
                </div>
                <h2 class="font-display text-4xl mb-1 uppercase tracking-tight">BRUNO</h2>
                <p class="text-ink/40 text-[10px] font-extrabold uppercase tracking-[0.2em] mb-6">Era el Impostor</p>
                
                <div class="bg-sticky-yellow text-ink px-4 py-2 rounded-btn shadow-hard border-2 border-ink rotate-2 inline-block">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm">military_tech</span>
                        <span class="font-display text-xs uppercase">+100 PTS</span>
                    </div>
                </div>
            </div>
            
            <!-- Floating Decorative Elements -->
            <div class="absolute -top-8 -right-4 bg-primary text-white p-2 rounded-full shadow-hard border-2 border-white rotate-12">
                <span class="material-symbols-outlined text-xl">stars</span>
            </div>
        </div>

        <div class="w-full max-w-xs space-y-4">
            <div class="bg-white/20 backdrop-blur-md p-4 rounded-card border-2 border-white/20">
                <p class="text-white font-bold uppercase tracking-widest text-[10px]">¡Victoria para los Agentes!</p>
            </div>
            
            <p class="text-white/80 font-bold uppercase tracking-[0.3em] text-[10px] animate-pulse">Sincronizando puntos...</p>
            <!-- Thin Time Bar -->
            <div class="w-full h-1.5 bg-white/20 rounded-full overflow-hidden">
                <div class="h-full bg-white animate-countdown"></div>
            </div>
        </div>
    </main>

    <footer class="p-6 w-full relative z-10">
        <a href="09_Results_AgentesWin.html" class="w-full block bg-white text-accent font-display text-2xl py-5 rounded-btn shadow-hard active:translate-y-1 transition-all uppercase tracking-widest text-center">
            Ver Resultados
        </a>
    </footer>

</body>
</html>
