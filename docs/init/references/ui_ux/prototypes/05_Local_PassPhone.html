<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasar Teléfono - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "primary-muted": "#FFF0E5",
                        "secondary": "#4D9DE0",
                        "accent": "#87C38F",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                        "shadow-col": "rgba(43, 45, 66, 0.15)",
                    },
                    fontFamily: {
                        "display": ["Fredoka One", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.15)',
                        'hard-lg': '6px 6px 0px rgba(43, 45, 66, 0.15)',
                    },
                    borderRadius: {
                        'card': '24px',
                        'btn': '16px',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-dots {
            background-image: radial-gradient(rgba(43, 45, 66, 0.1) 1.5px, transparent 1.5px);
            background-size: 20px 20px;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
        
        @keyframes countdown {
            from { width: 100%; }
            to { width: 0%; }
        }
        .animate-countdown {
            animation: countdown 10s linear forwards;
        }
    </style>
</head>
<body class="bg-bg-paper text-ink font-body min-h-screen flex flex-col items-center justify-center p-6 text-center pattern-dots max-w-md mx-auto shadow-2xl overflow-hidden relative">

    <main class="flex-1 flex flex-col items-center justify-center space-y-8 w-full animate-fade-in">
        <!-- Passing Icon -->
        <div class="relative w-40 h-40 flex items-center justify-center">
            <div class="absolute inset-0 bg-primary/10 rounded-full animate-ping scale-125"></div>
            <div class="bg-white rounded-full p-8 shadow-hard border-4 border-ink relative z-10">
                <span class="material-symbols-outlined text-primary text-7xl">front_hand</span>
            </div>
        </div>

        <div class="space-y-2">
            <h1 class="font-display text-4xl uppercase tracking-tight leading-none text-primary">¡Turno Completado!</h1>
            <p class="text-xs font-bold uppercase tracking-[0.2em] text-ink/40">Mantén la privacidad</p>
        </div>

        <div class="bg-white p-8 rounded-card border-4 border-ink shadow-hard-lg w-full relative">
            <p class="text-ink/40 text-xs font-bold uppercase tracking-widest mb-4">Entrega el móvil a:</p>
            <h2 class="text-ink font-display text-5xl mb-2 uppercase tracking-widest">BRUNO</h2>
            <div class="w-16 h-1.5 bg-primary/20 rounded-full mx-auto mt-4"></div>
        </div>

        <div class="w-full max-w-xs pt-8">
            <div class="flex flex-col items-center gap-3">
                <p class="text-ink/40 font-bold uppercase tracking-[0.3em] text-[10px] animate-pulse">Esperando confirmación...</p>
                <!-- Thin Time Bar -->
                <div class="w-full h-1.5 bg-ink/5 rounded-full overflow-hidden">
                    <div class="h-full bg-primary animate-countdown"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="p-6 w-full">
        <a href="05_Local_RevealRole.html" class="w-full block bg-ink text-white font-display text-2xl py-6 rounded-btn shadow-hard active:translate-y-1 transition-all uppercase tracking-widest text-center">
            Ya tengo el móvil
        </a>
    </footer>

</body>
</html>
