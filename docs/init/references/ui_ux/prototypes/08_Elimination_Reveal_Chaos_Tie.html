<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empate Caos - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:wght@200..800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "secondary": "#4D9DE0",
                        "accent": "#87C38F",
                        "danger": "#E63946",
                        "purple": "#9D4EDD",
                        "yellow": "#FFD166",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                    },
                    fontFamily: {
                        "display": ["Fredoka", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.15)',
                        'hard-lg': '8px 8px 0px rgba(43, 45, 66, 0.3)',
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes spotlight {
            0% { opacity: 0; transform: scale(0.8); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }
        @keyframes reveal-bg-neutral {
            0% { background-color: #2B2D42; }
            100% { background-color: #2B2D42; } /* Se mantiene oscuro o cambia a un gris frío */
        }
        @keyframes stamp-yellow {
            0% { transform: scale(5); opacity: 0; }
            100% { transform: scale(1) rotate(-2deg); opacity: 1; }
        }
        @keyframes drift {
            0% { transform: translate(0, 0); }
            50% { transform: translate(-5px, 5px); }
            100% { transform: translate(0, 0); }
        }

        .animate-spotlight { animation: spotlight 1s ease-out forwards; }
        .animate-reveal-bg { animation: reveal-bg-neutral 0.5s 3.5s forwards; }
        .animate-stamp { opacity: 0; animation: stamp-yellow 0.4s 4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-drift { animation: drift 3s infinite ease-in-out; }
        
        .delay-1 { animation-delay: 1s; }
        .delay-2 { animation-delay: 2s; }

        .pattern-dots-light {
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1.5px, transparent 1.5px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-ink text-white font-body min-h-screen flex flex-col items-center justify-center overflow-hidden animate-reveal-bg">
    
    <div class="absolute inset-0 pattern-dots-light opacity-20"></div>

    <!-- Escena de Empate -->
    <main class="relative z-10 flex flex-col items-center gap-12 w-full max-w-lg p-6">
        
        <!-- Fase 1: El Título -->
        <div class="text-center space-y-2">
            <p class="font-display text-lg uppercase tracking-[0.4em] opacity-0 animate-spotlight">Confusión en la mesa...</p>
            <h1 class="font-display text-5xl uppercase tracking-tighter opacity-0 animate-spotlight delay-1">VEREDICTO NULO</h1>
        </div>

        <!-- Fase 2: Los Sospechosos Empatados -->
        <div class="w-full flex items-center justify-center gap-12 relative">
            
            <!-- Grupo 1 -->
            <div class="relative z-10 animate-spotlight delay-2">
                <div class="bg-white p-1 rounded-full border-4 border-ink shadow-hard opacity-60 grayscale scale-90">
                    <div class="w-20 h-20 rounded-full overflow-hidden bg-primary flex items-center justify-center">
                        <span class="text-4xl">🐱</span>
                    </div>
                </div>
            </div>

            <!-- VS Icon (Neutral) -->
            <div class="relative z-20 opacity-0 animate-spotlight" style="animation-delay: 2.5s">
                <div class="bg-white/10 text-white w-10 h-10 rounded-full flex items-center justify-center border-2 border-white/20">
                    <span class="font-display text-sm">=</span>
                </div>
            </div>

            <!-- Grupo 2 -->
            <div class="relative z-10 animate-spotlight delay-2">
                <div class="bg-white p-1 rounded-full border-4 border-ink shadow-hard opacity-60 grayscale scale-90">
                    <div class="w-20 h-20 rounded-full overflow-hidden bg-secondary flex items-center justify-center">
                        <span class="text-4xl">🦊</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Fase 3: El Sello de Empate -->
        <div class="flex flex-col items-center gap-6">
            <div class="opacity-0 animate-stamp">
                <div class="bg-yellow text-ink px-12 py-5 border-4 border-white shadow-hard-lg rounded-2xl rotate-[-2deg]">
                    <p class="font-display text-5xl uppercase leading-none tracking-widest">¡EMPATE!</p>
                </div>
            </div>
            
            <div class="text-center space-y-2 opacity-0 animate-stamp" style="animation-delay: 4.5s">
                <p class="font-display text-xl uppercase tracking-widest text-white/80">Nadie abandona el juego</p>
                <p class="text-[10px] font-black uppercase tracking-[0.3em] text-yellow/60">La sospecha se duplica para la siguiente ronda</p>
            </div>
        </div>

    </main>

    <!-- Botón para continuar -->
    <footer class="absolute bottom-10 w-full max-w-xs px-6 opacity-0 animate-stamp" style="animation-delay: 5.5s">
        <a href="06_Pistas.html" class="w-full block bg-white text-ink font-display text-2xl py-5 rounded-xl shadow-hard hover:translate-y-1 active:translate-y-2 active:shadow-none transition-all text-center uppercase tracking-widest">
            Continuar
        </a>
    </footer>

</body>
</html>
