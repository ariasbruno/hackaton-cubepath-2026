<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Sala - Paso 2 - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:wght@200..800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "primary-muted": "#FFF0E5",
                        "secondary": "#4D9DE0",
                        "secondary-muted": "#EBF5FF",
                        "accent": "#87C38F",
                        "accent-muted": "#F0F9F1",
                        "danger": "#E63946",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                        "shadow-col": "rgba(43, 45, 66, 0.15)",
                    },
                    fontFamily: {
                        "display": ["Fredoka", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                        "mono": ["Varela Round", "monospace"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.15)',
                        'hard-sm': '2px 2px 0px rgba(43, 45, 66, 0.15)',
                        'hard-lg': '6px 6px 0px rgba(43, 45, 66, 0.15)',
                        'inner-hard': 'inset 3px 3px 0px rgba(0,0,0,0.1)',
                    },
                    borderRadius: {
                        'card': '24px',
                        'btn': '16px',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-dots {
            background-image: radial-gradient(rgba(43, 45, 66, 0.1) 1.5px, transparent 1.5px);
            background-size: 20px 20px;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
        .paper-card { transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); }
        .paper-card:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px rgba(43, 45, 66, 0.15); }
        
        /* Bottom Sheet Animation */
        #bottom-sheet { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        #overlay { transition: opacity 0.3s ease; }
        .sheet-hidden { transform: translateY(100%); }
        .overlay-hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body class="bg-bg-paper text-ink font-body min-h-screen flex flex-col pattern-dots max-w-md mx-auto shadow-2xl relative overflow-hidden">

    <!-- Stepper Header -->
    <header class="p-6 flex flex-col gap-6">
        <div class="flex items-center justify-between">
            <a href="03_Create_Step1_Connection.html" class="w-12 h-12 flex items-center justify-center bg-white rounded-full shadow-hard border-2 border-ink active:translate-y-0.5 active:shadow-none transition-all">
                <span class="material-symbols-outlined text-ink">arrow_back</span>
            </a>
            <div class="flex gap-2">
                <div class="w-8 h-2 bg-accent rounded-full"></div>
                <div class="w-8 h-2 bg-primary rounded-full"></div>
                <div class="w-8 h-2 bg-ink/5 rounded-full"></div>
                <div class="w-8 h-2 bg-ink/5 rounded-full"></div>
            </div>
            <span class="font-display text-primary text-lg">2/4</span>
        </div>
    </header>

    <main class="flex-1 p-6 flex flex-col items-center">
        <div class="text-center mb-10">
            <h2 class="font-display text-4xl mb-2 uppercase tracking-tight leading-none">Elegí el Tema</h2>
            <p class="text-xs text-ink/40 font-bold uppercase tracking-widest">Toca una categoría para ver subtemas</p>
        </div>

        <!-- Category Grid: Now interactive -->
        <div class="grid grid-cols-2 gap-4 w-full">
            <button onclick="openSheet('Comida', 'restaurant', 'secondary')" class="bg-white p-6 rounded-card border-4 border-ink/5 shadow-hard hover:border-secondary paper-card flex flex-col items-center gap-3 group">
                <div class="w-16 h-16 bg-secondary/10 text-secondary rounded-full flex items-center justify-center group-hover:scale-110 transition-transform">
                    <span class="material-symbols-outlined text-4xl">restaurant</span>
                </div>
                <p class="font-display text-lg uppercase tracking-tight">Comida</p>
            </button>

            <button onclick="openSheet('Cine', 'movie', 'primary')" class="bg-white p-6 rounded-card border-4 border-ink/5 shadow-hard hover:border-primary paper-card flex flex-col items-center gap-3 group">
                <div class="w-16 h-16 bg-primary/10 text-primary rounded-full flex items-center justify-center group-hover:scale-110 transition-transform">
                    <span class="material-symbols-outlined text-4xl">movie</span>
                </div>
                <p class="font-display text-lg uppercase tracking-tight">Cine</p>
            </button>

            <button onclick="openSheet('Animales', 'pets', 'accent')" class="bg-white p-6 rounded-card border-4 border-ink/5 shadow-hard hover:border-accent paper-card flex flex-col items-center gap-3 group">
                <div class="w-16 h-16 bg-accent/10 text-accent rounded-full flex items-center justify-center group-hover:scale-110 transition-transform">
                    <span class="material-symbols-outlined text-4xl">pets</span>
                </div>
                <p class="font-display text-lg uppercase tracking-tight">Animales</p>
            </button>

            <button onclick="openSheet('Mundo', 'travel_explore', 'purple')" class="bg-white p-6 rounded-card border-4 border-ink/5 shadow-hard hover:border-purple paper-card flex flex-col items-center gap-3 group">
                <div class="w-16 h-16 bg-purple/10 text-purple rounded-full flex items-center justify-center group-hover:scale-110 transition-transform">
                    <span class="material-symbols-outlined text-4xl">travel_explore</span>
                </div>
                <p class="font-display text-lg uppercase tracking-tight">Mundo</p>
            </button>
        </div>
    </main>

    <footer class="p-6 pb-10">
        <div class="bg-ink/5 p-4 rounded-btn text-center text-[10px] font-extrabold text-ink/30 uppercase tracking-[0.2em]">
            Selecciona un tema para continuar
        </div>
    </footer>

    <!-- Bottom Sheet overlay: Hidden by default -->
    <div id="overlay" onclick="closeSheet()" class="absolute inset-0 bg-ink/40 backdrop-blur-sm z-40 overlay-hidden"></div>
    
    <!-- Bottom Sheet Content: Hidden by default -->
    <div id="bottom-sheet" class="absolute bottom-0 left-0 right-0 bg-bg-paper rounded-t-[40px] border-t border-ink/5 shadow-[0_-10px_40px_rgba(43,45,66,0.15)] z-50 p-8 pt-4 sheet-hidden">
        <!-- Handle bar -->
        <div class="w-16 h-1.5 bg-ink/10 rounded-full mx-auto mb-8"></div>
        
        <div class="flex justify-between items-center mb-8">
            <h3 id="sheet-title" class="font-display text-2xl uppercase tracking-tight text-secondary">Categoría</h3>
            <span id="sheet-icon" class="material-symbols-outlined text-secondary opacity-20 text-3xl">category</span>
        </div>

        <!-- Subcategories Switches -->
        <div class="space-y-4 mb-10">
            <label class="flex justify-between items-center bg-white p-5 rounded-btn border-2 border-ink/5 shadow-hard-sm cursor-pointer active:translate-y-0.5 transition-all">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-accent/10 text-accent rounded-full flex items-center justify-center">
                        <span class="material-symbols-outlined text-xl">check_circle</span>
                    </div>
                    <span class="font-bold uppercase tracking-widest text-xs">Subcategoría A</span>
                </div>
                <input type="checkbox" checked class="hidden peer">
                <div class="w-14 h-8 bg-ink/10 peer-checked:bg-accent rounded-full relative transition-colors">
                    <div class="w-6 h-6 bg-white rounded-full absolute top-1 left-1 peer-checked:left-7 shadow-sm transition-all"></div>
                </div>
            </label>

            <label class="flex justify-between items-center bg-white p-5 rounded-btn border-2 border-ink/5 shadow-hard-sm cursor-pointer active:translate-y-0.5 transition-all">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-accent/10 text-accent rounded-full flex items-center justify-center">
                        <span class="material-symbols-outlined text-xl">check_circle</span>
                    </div>
                    <span class="font-bold uppercase tracking-widest text-xs">Subcategoría B</span>
                </div>
                <input type="checkbox" class="hidden peer">
                <div class="w-14 h-8 bg-ink/10 peer-checked:bg-accent rounded-full relative transition-colors">
                    <div class="w-6 h-6 bg-white rounded-full absolute top-1 left-1 peer-checked:left-7 shadow-sm transition-all"></div>
                </div>
            </label>
        </div>

        <a href="03_Create_Step3_GameMode.html" class="w-full block bg-primary text-white font-display text-2xl py-6 rounded-btn shadow-hard-lg active:translate-y-1 active:shadow-none transition-all uppercase tracking-widest text-center">
            Confirmar
        </a>
    </div>

    <script>
        const sheet = document.getElementById('bottom-sheet');
        const overlay = document.getElementById('overlay');
        const titleEl = document.getElementById('sheet-title');
        const iconEl = document.getElementById('sheet-icon');

        function openSheet(title, icon, colorClass) {
            titleEl.innerText = title;
            iconEl.innerText = icon;
            
            // Cambiar colores dinámicamente según la categoría
            const colorHex = {
                'secondary': '#4D9DE0',
                'primary': '#FF8C42',
                'accent': '#87C38F',
                'purple': '#9D4EDD'
            }[colorClass];
            
            titleEl.style.color = colorHex;
            iconEl.style.color = colorHex;

            overlay.classList.remove('overlay-hidden');
            sheet.classList.remove('sheet-hidden');
        }

        function closeSheet() {
            overlay.classList.add('overlay-hidden');
            sheet.classList.add('sheet-hidden');
        }
    </script>

</body>
</html>
