<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agente Eliminado (Desktop) - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "primary-muted": "#FFF0E5",
                        "secondary": "#4D9DE0",
                        "accent": "#87C38F",
                        "danger": "#E63946",
                        "danger-muted": "#FFF0F1",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                        "shadow-col": "rgba(43, 45, 66, 0.3)",
                    },
                    fontFamily: {
                        "display": ["Fredoka One", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                        "mono": ["Varela Round", "monospace"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.3)',
                        'hard-sm': '2px 2px 0px rgba(43, 45, 66, 0.2)',
                        'hard-lg': '12px 12px 0px rgba(43, 45, 66, 0.4)',
                    },
                    borderRadius: {
                        'card': '32px',
                        'btn': '24px',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-checkers {
            background-image: repeating-linear-gradient(45deg, rgba(0, 0, 0, 0.15) 50px, transparent 50px, transparent 100px, rgba(0, 0, 0, 0.15) 100px, rgba(0, 0, 0, 0.15) 150px, transparent 150px, transparent 200px);
            background-size: 400px 400px;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
        
        @keyframes countdown {
            from { width: 100%; }
            to { width: 0%; }
        }
        .animate-countdown {
            animation: countdown 5s linear forwards;
        }
        
        .float {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }

        .ghost-float {
            animation: ghostFloat 8s ease-in-out infinite;
        }
        @keyframes ghostFloat {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0.1; }
            33% { transform: translate(100px, -50px) rotate(10deg); opacity: 0.2; }
            66% { transform: translate(-50px, -100px) rotate(-10deg); opacity: 0.15; }
            100% { transform: translate(0, 0) rotate(0deg); opacity: 0.1; }
        }

        .vignette {
            background: radial-gradient(circle at center, transparent 0%, rgba(230, 57, 70, 0.15) 100%);
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-ink text-white font-body min-h-screen flex flex-col items-center justify-center pattern-checkers overflow-hidden relative">

    <div class="absolute inset-0 vignette z-0"></div>

    <!-- Background Ghosts -->
    <div class="absolute top-20 left-20 ghost-float text-9xl">👻</div>
    <div class="absolute bottom-40 right-40 ghost-float text-8xl" style="animation-delay: -2s;">👻</div>
    <div class="absolute top-1/2 right-20 ghost-float text-7xl" style="animation-delay: -4s;">👻</div>

    <main class="w-full max-w-6xl flex flex-col items-center justify-center space-y-20 relative z-10 py-20">
        
        <div class="text-center space-y-8 relative">
            <div class="absolute inset-0 bg-danger/20 blur-3xl rounded-full scale-150 animate-pulse"></div>
            <h1 class="font-display text-8xl md:text-9xl drop-shadow-[0_10px_10px_rgba(0,0,0,0.5)] leading-none uppercase tracking-tighter text-white rotate-[-4deg] italic">
                ¡ERROR<br/><span class="text-danger">FATAL!</span>
            </h1>
            <p class="text-white/40 font-black uppercase tracking-[1em] text-xl">Protocolo de expulsión completado</p>
        </div>

        <!-- Victim Card (XL) -->
        <div class="relative group">
            <div class="bg-white text-ink p-16 rounded-card border-8 border-ink shadow-hard-lg relative z-10 max-w-2xl transform hover:scale-[1.02] transition-transform duration-500">
                <div class="w-64 h-64 bg-ink/5 rounded-full border-8 border-ink/10 flex items-center justify-center mx-auto mb-12 relative overflow-hidden group-hover:rotate-6 transition-transform">
                    <span class="text-9xl grayscale opacity-40">🐱</span>
                    <div class="absolute -top-4 -right-4 bg-danger text-white p-4 rounded-2xl shadow-hard border-4 border-ink rotate-12">
                        <span class="text-5xl">👻</span>
                    </div>
                </div>
                
                <div class="text-center">
                    <h2 class="font-display text-8xl mb-4 uppercase tracking-tighter text-ink leading-none">BRUNO</h2>
                    <p class="text-ink/30 text-xl font-black uppercase tracking-[0.4em] mb-12">Era un Agente Inocente</p>
                    
                    <div class="p-10 bg-danger-muted border-4 border-danger/20 rounded-btn relative">
                        <span class="material-symbols-outlined absolute -top-6 -left-6 text-6xl text-danger/20 rotate-12">format_quote</span>
                        <p class="text-danger text-3xl font-bold leading-relaxed uppercase tracking-widest italic">
                            "¡Se los dije! ¡Yo no era!"
                        </p>
                        <span class="material-symbols-outlined absolute -bottom-6 -right-6 text-6xl text-danger/20 rotate-[-12deg]">format_quote</span>
                    </div>
                </div>
            </div>
            
            <!-- Floating Elements around the card -->
            <div class="absolute -top-20 -right-20 float text-8xl z-0" style="animation-delay: 0.5s;">👻</div>
            <div class="absolute top-1/2 -left-32 float text-7xl z-0" style="animation-delay: 1.5s;">👻</div>
        </div>

        <div class="w-full max-w-2xl space-y-8">
            <div class="flex items-center justify-between text-white/60 font-black uppercase tracking-widest text-sm">
                <span>Estado: Continuación de Operaciones</span>
                <span>Amenaza: Aún Activa</span>
            </div>
            <!-- Robust Time Bar -->
            <div class="w-full h-6 bg-white/5 rounded-full overflow-hidden border-2 border-white/10 shadow-inner-hard p-1">
                <div class="h-full bg-danger rounded-full animate-countdown shadow-[0_0_20px_rgba(230,57,70,0.5)]"></div>
            </div>
            <p class="text-white font-black uppercase tracking-[0.5em] text-sm text-center animate-pulse italic">El impostor sigue entre nosotros...</p>
        </div>
    </main>

    <!-- Action Footer -->
    <footer class="w-full max-w-6xl px-10 pb-16 z-20">
        <a href="06_Pistas_Desktop.html" class="w-full block bg-white text-ink font-display text-4xl py-10 rounded-btn shadow-hard-lg hover:translate-y-[-4px] active:translate-y-4 active:shadow-none transition-all uppercase tracking-[0.2em] text-center border-4 border-ink">
            Siguiente Ronda
        </a>
    </footer>

</body>
</html>
