<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infiltrado Eliminado - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "primary-muted": "#FFF0E5",
                        "secondary": "#4D9DE0",
                        "accent": "#87C38F",
                        "danger": "#E63946",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                        "shadow-col": "rgba(43, 45, 66, 0.15)",
                        "sticky-yellow": "#FFD166",
                    },
                    fontFamily: {
                        "display": ["Fredoka One", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.15)',
                        'hard-sm': '2px 2px 0px rgba(43, 45, 66, 0.15)',
                        'hard-lg': '6px 6px 0px rgba(43, 45, 66, 0.15)',
                    },
                    borderRadius: {
                        'card': '24px',
                        'btn': '16px',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-checkers {
            background-image: repeating-linear-gradient(45deg, rgba(77, 157, 224, 0.05) 25px, transparent 25px, transparent 50px, rgba(77, 157, 224, 0.05) 50px, rgba(77, 157, 224, 0.05) 75px, transparent 75px, transparent 100px);
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
        
        @keyframes countdown {
            from { width: 100%; }
            to { width: 0%; }
        }
        .animate-countdown {
            animation: countdown 10s linear forwards;
        }
        
        .confetti {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #FFD166;
            animation: confetti-fall 4s linear infinite;
            z-index: 0;
        }
        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body class="bg-secondary text-white font-body min-h-screen flex flex-col items-center justify-center p-6 text-center pattern-checkers max-w-md mx-auto shadow-2xl overflow-hidden relative">

    <!-- Confetti particles -->
    <div class="absolute inset-0 pointer-events-none">
        <div class="confetti" style="left: 15%; animation-delay: 0.2s; background-color: white;"></div>
        <div class="confetti" style="left: 30%; animation-delay: 1.2s; background-color: #87C38F;"></div>
        <div class="confetti" style="left: 45%; animation-delay: 0.5s; background-color: #FFF;"></div>
        <div class="confetti" style="left: 60%; animation-delay: 2.1s; background-color: #FFD166;"></div>
        <div class="confetti" style="left: 85%; animation-delay: 0.8s; background-color: white;"></div>
    </div>

    <main class="flex-1 flex flex-col items-center justify-center space-y-10 w-full animate-fade-in relative z-10">
        <div class="relative w-full">
            <div class="absolute inset-0 bg-white/20 blur-3xl rounded-full scale-110 animate-pulse"></div>
            <h1 class="font-display text-4xl md:text-5xl drop-shadow-lg leading-tight rotate-[-2deg] uppercase">¡INFILTRADO<br/>DESCUBIERTO!</h1>
        </div>

        <!-- The Word Comparison Card -->
        <div class="relative w-full max-w-xs">
            <div class="bg-white text-ink p-8 rounded-card border-4 border-ink shadow-hard-lg relative z-10">
                
                <h2 class="font-display text-3xl mb-1 uppercase tracking-tight text-secondary">ANA</h2>
                <p class="text-ink/40 text-[10px] font-extrabold uppercase tracking-[0.2em] mb-6">Era la Infiltrada</p>
                
                <!-- Words Comparison -->
                <div class="flex flex-col gap-2 relative">
                    <div class="bg-accent-muted p-4 rounded-t-btn border-2 border-accent/20 relative overflow-hidden">
                        <span class="absolute -right-2 -bottom-4 text-accent opacity-10 text-6xl material-symbols-outlined">visibility</span>
                        <p class="text-[8px] font-bold text-accent uppercase tracking-widest mb-1 relative z-10 text-left">Palabra Agentes</p>
                        <h3 class="font-display text-3xl text-accent uppercase tracking-widest relative z-10">PERRO</h3>
                    </div>
                    
                    <!-- VS Badge -->
                    <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 bg-white w-8 h-8 rounded-full border-2 border-ink shadow-hard-sm flex items-center justify-center z-20">
                        <span class="font-display text-danger text-sm">VS</span>
                    </div>

                    <div class="bg-danger-muted p-4 rounded-b-btn border-2 border-danger/20 relative overflow-hidden text-left">
                        <span class="absolute -right-2 -bottom-4 text-danger opacity-10 text-6xl material-symbols-outlined">visibility_off</span>
                        <p class="text-[8px] font-bold text-danger uppercase tracking-widest mb-1 relative z-10">Palabra Infiltrado</p>
                        <h3 class="font-display text-3xl text-danger uppercase tracking-widest relative z-10">LOBO</h3>
                    </div>
                </div>

                <div class="absolute -top-4 -left-4 bg-sticky-yellow text-ink p-2 rounded-full shadow-hard border-2 border-white rotate-[-12deg]">
                    <span class="material-symbols-outlined text-2xl">search_check</span>
                </div>
            </div>
        </div>

        <div class="w-full max-w-xs space-y-4">
            <div class="bg-white/20 backdrop-blur-md p-4 rounded-card border-2 border-white/20">
                <p class="text-white font-bold uppercase tracking-widest text-[10px]">¡Gran deducción de los Agentes!</p>
            </div>
            
            <p class="text-white/80 font-bold uppercase tracking-[0.3em] text-[10px] animate-pulse">Sincronizando puntos...</p>
            <!-- Thin Time Bar -->
            <div class="w-full h-1.5 bg-white/20 rounded-full overflow-hidden">
                <div class="h-full bg-white animate-countdown"></div>
            </div>
        </div>
    </main>

    <footer class="p-6 w-full relative z-10">
        <a href="09_Results_AgentesWin.html" class="w-full block bg-white text-secondary font-display text-2xl py-5 rounded-btn shadow-hard active:translate-y-1 transition-all uppercase tracking-widest text-center">
            Ver Resultados
        </a>
    </footer>

</body>
</html>
