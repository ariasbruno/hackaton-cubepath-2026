<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infiltrado Eliminado (Desktop) - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "primary-muted": "#FFF0E5",
                        "secondary": "#4D9DE0",
                        "accent": "#87C38F",
                        "accent-muted": "#F0F9F1",
                        "danger": "#E63946",
                        "danger-muted": "#FFF0F1",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                        "shadow-col": "rgba(43, 45, 66, 0.3)",
                        "sticky-yellow": "#FFD166",
                    },
                    fontFamily: {
                        "display": ["Fredoka One", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                        "mono": ["Varela Round", "monospace"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.3)',
                        'hard-sm': '2px 2px 0px rgba(43, 45, 66, 0.2)',
                        'hard-lg': '12px 12px 0px rgba(43, 45, 66, 0.4)',
                    },
                    borderRadius: {
                        'card': '32px',
                        'btn': '24px',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-checkers {
            background-image: repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.08) 50px, transparent 50px, transparent 100px, rgba(255, 255, 255, 0.08) 100px, rgba(255, 255, 255, 0.08) 150px, transparent 150px, transparent 200px);
            background-size: 400px 400px;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
        
        @keyframes countdown {
            from { width: 100%; }
            to { width: 0%; }
        }
        .animate-countdown {
            animation: countdown 10s linear forwards;
        }
        
        .confetti {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #FFD166;
            animation: confetti-fall 6s linear infinite;
            z-index: 0;
            border-radius: 4px;
        }
        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 1; }
            50% { transform: translateY(50vh) rotate(360deg) translateX(50px); opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(720deg) translateX(-50px); opacity: 0; }
        }

        .victory-glow {
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.3) 0%, transparent 70%);
        }
    </style>
</head>
<body class="bg-secondary text-white font-body min-h-screen flex flex-col items-center justify-center pattern-checkers overflow-hidden relative">

    <div class="absolute inset-0 victory-glow z-0"></div>

    <!-- Confetti particles (Scaled up for Desktop) -->
    <div class="absolute inset-0 pointer-events-none overflow-hidden">
        <div class="confetti" style="left: 10%; animation-delay: 0.2s; background-color: white;"></div>
        <div class="confetti" style="left: 25%; animation-delay: 1.5s; background-color: #87C38F; width: 15px; height: 15px;"></div>
        <div class="confetti" style="left: 40%; animation-delay: 0.8s; background-color: #FFF; width: 25px; height: 25px;"></div>
        <div class="confetti" style="left: 55%; animation-delay: 2.5s; background-color: #FFD166;"></div>
        <div class="confetti" style="left: 70%; animation-delay: 0.5s; background-color: white; width: 12px; height: 12px;"></div>
        <div class="confetti" style="left: 85%; animation-delay: 1.8s; background-color: #87C38F;"></div>
        <div class="confetti" style="left: 95%; animation-delay: 3.2s; background-color: white;"></div>
    </div>

    <main class="w-full max-w-6xl flex flex-col items-center justify-center space-y-20 relative z-10 py-20">
        
        <div class="text-center space-y-8 relative">
            <div class="absolute inset-0 bg-white/20 blur-3xl rounded-full scale-150 animate-pulse"></div>
            <h1 class="font-display text-8xl md:text-9xl drop-shadow-[0_10px_10px_rgba(0,0,0,0.3)] leading-none uppercase tracking-tighter text-white rotate-[-3deg] italic">
                ¡INFILTRADO<br/><span class="text-white/90">DESCUBIERTO!</span>
            </h1>
            <p class="text-white font-black uppercase tracking-[1em] text-xl">Misión cumplida: Amenaza neutralizada</p>
        </div>

        <!-- Word Comparison Card (XL) -->
        <div class="relative group">
            <div class="bg-white text-ink p-16 rounded-card border-8 border-ink shadow-hard-lg relative z-10 max-w-3xl transform hover:scale-[1.02] transition-transform duration-500">
                
                <div class="text-center mb-12">
                    <h2 class="font-display text-8xl mb-2 uppercase tracking-tighter text-secondary leading-none">ANA</h2>
                    <p class="text-ink/30 text-xl font-black uppercase tracking-[0.4em]">Era la Infiltrada</p>
                </div>
                
                <!-- Words Comparison (Dual Panel) -->
                <div class="grid grid-cols-2 gap-8 relative mt-16">
                    <div class="bg-accent-muted p-12 rounded-card border-4 border-accent shadow-hard-lg relative overflow-hidden transform hover:-rotate-1 transition-transform">
                        <span class="absolute -right-4 -bottom-8 text-accent opacity-10 text-9xl material-symbols-outlined">visibility</span>
                        <p class="text-xs font-black text-accent uppercase tracking-widest mb-4 relative z-10 text-left">Palabra Agentes</p>
                        <h3 class="font-display text-7xl text-accent uppercase tracking-[0.1em] relative z-10">PERRO</h3>
                    </div>
                    
                    <!-- VS Badge (XL) -->
                    <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 bg-white w-24 h-24 rounded-full border-4 border-ink shadow-hard-lg flex items-center justify-center z-20">
                        <span class="font-display text-danger text-4xl">VS</span>
                    </div>

                    <div class="bg-danger-muted p-12 rounded-card border-4 border-danger shadow-hard-lg relative overflow-hidden text-left transform hover:rotate-1 transition-transform">
                        <span class="absolute -right-4 -bottom-8 text-danger opacity-10 text-9xl material-symbols-outlined">visibility_off</span>
                        <p class="text-xs font-black text-danger uppercase tracking-widest mb-4 relative z-10">Palabra Infiltrado</p>
                        <h3 class="font-display text-7xl text-danger uppercase tracking-[0.1em] relative z-10">LOBO</h3>
                    </div>
                </div>

                <div class="absolute -top-8 -left-8 bg-sticky-yellow text-ink p-6 rounded-full shadow-hard-lg border-4 border-ink rotate-[-12deg] animate-bounce">
                    <span class="material-symbols-outlined text-6xl">search_check</span>
                </div>
            </div>
        </div>

        <div class="w-full max-w-3xl space-y-8">
            <div class="bg-white/10 backdrop-blur-md p-10 rounded-card border-4 border-white/20 shadow-hard-lg">
                <p class="text-white font-display text-5xl uppercase tracking-widest text-center italic">¡GRAN DEDUCCIÓN!</p>
            </div>
            
            <div class="flex flex-col items-center gap-4">
                <p class="text-white/80 font-black uppercase tracking-[0.5em] text-sm animate-pulse">Sincronizando tabla de puntuaciones...</p>
                <!-- Robust Time Bar -->
                <div class="w-full h-6 bg-white/20 rounded-full overflow-hidden border-2 border-white/10 shadow-inner-hard p-1">
                    <div class="h-full bg-white rounded-full animate-countdown shadow-[0_0_20px_rgba(255,255,255,0.5)]"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Action Footer -->
    <footer class="w-full max-w-6xl px-10 pb-16 z-20">
        <a href="09_Results_AgentesWin_Desktop.html" class="w-full block bg-white text-secondary font-display text-4xl py-10 rounded-btn shadow-hard-lg hover:translate-y-[-4px] active:translate-y-4 active:shadow-none transition-all uppercase tracking-[0.2em] text-center border-4 border-ink">
            Ver Resultados
        </a>
    </footer>

</body>
</html>
