<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caos: Empate - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:wght@200..800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "secondary": "#4D9DE0",
                        "accent": "#87C38F",
                        "danger": "#E63946",
                        "brand-purple": "#9D4EDD",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                    },
                    fontFamily: {
                        "display": ["Fredoka", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.15)',
                    },
                    animation: {
                        'bounce-slow': 'bounce 3s infinite',
                    }
                }
            }
        }
    </script>
    <style>
        
.material-symbols-outlined {
  font-variation-settings:
  'FILL' 1,
  'wght' 400,
  'GRAD' 0,
  'opsz' 24
}

        .pattern-dots {
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
        .rotate-41 { transform: rotate(41deg); }
    </style>
</head>
<body class="h-screen w-screen bg-[#4C1D95] pattern-dots relative overflow-hidden flex flex-col items-center justify-center p-6 text-white text-center font-body">

    <!-- Background Decor -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[150%] h-[50%] bg-purple-500/30 blur-[120px] rotate-41 pointer-events-none"></div>
    <div class="absolute inset-0 bg-gradient-to-b from-transparent via-purple-900/40 to-[#1A202C]/60 pointer-events-none"></div>

    <main class="relative z-10 space-y-8 animate-fade-in w-full max-w-sm">
        
        <div class="space-y-2 flex flex-col items-center">
            <div class="inline-flex items-center gap-2 px-4 py-1.5 bg-white/10 rounded-full backdrop-blur-md border border-white/10 mb-4 scale-90">
                <span class="material-symbols-outlined text-red-300 text-[16px]">gavel</span>
                <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-red-200 pt-0.5" style="letter-spacing: 0.25em;">Pareja Descubierta</span>
            </div>
            
            <h1 class="font-display font-bold text-5xl md:text-6xl italic leading-none uppercase tracking-tighter drop-shadow-2xl">
                SIGUEN EN <br />
                <span class="text-purple-300 drop-shadow-[0_0_20px_rgba(167,139,250,0.5)]">EL CAOS</span>
            </h1>
        </div>

        <div class="relative py-12">
            <!-- Background straight horizontal line -->
            <div class="absolute inset-x-0 top-1/2 h-1 bg-gradient-to-r from-transparent via-purple-400/30 to-transparent"></div>
            
            <!-- Bouncing Box -->
            <div class="relative bg-[#310E68] w-24 h-24 mx-auto rounded-[1.5rem] border-4 border-purple-400 rotate-12 flex items-center justify-center shadow-[0_0_40px_rgba(139,92,246,0.3)] z-10">
                <span class="material-symbols-outlined text-purple-300 -rotate-12" style="font-size: 48px;">bolt</span>
            </div>
        </div>

        <!-- This renders natively exactly at absolute center of the main wrapper because it lacks relative parent in <p> -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center justify-center w-full z-0 opacity-40 pointer-events-none mt-8">
            <div class="w-16 h-1 bg-gradient-to-r from-transparent via-purple-300 to-transparent blur-[2px] animate-pulse"></div>
            <span class="material-symbols-outlined text-purple-300 mx-2 animate-pulse" style="font-size: 36px;">bolt</span>
            <div class="w-16 h-1 bg-gradient-to-r from-transparent via-purple-300 to-transparent blur-[2px] animate-pulse"></div>
        </div>

        <div class="relative">
            <p class="text-sm font-medium text-purple-200/60 leading-relaxed px-8">
                La pareja sigue oculta entre nosotros. <br />
                El Caos se intensifica...
            </p>
        </div>

        <div class="pt-8 opacity-40">
            <div class="flex items-center justify-center gap-3">
                <div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                <p class="font-mono uppercase tracking-[0.3em] text-[10px] font-black">Próxima ronda...</p>
            </div>
        </div>

    </main>

</body>
</html>
