<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asignación Infiltrado - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "primary-muted": "#FFF0E5",
                        "secondary": "#4D9DE0",
                        "accent": "#87C38F",
                        "accent-muted": "#F0F9F1",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                        "shadow-col": "rgba(43, 45, 66, 0.15)",
                    },
                    fontFamily: {
                        "display": ["Fredoka One", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.15)',
                        'hard-lg': '6px 6px 0px rgba(43, 45, 66, 0.15)',
                    },
                    borderRadius: {
                        'card': '24px',
                        'btn': '16px',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-dots {
            background-image: radial-gradient(rgba(43, 45, 66, 0.1) 1.5px, transparent 1.5px);
            background-size: 20px 20px;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
        
        @keyframes countdown {
            from { width: 100%; }
            to { width: 0%; }
        }
        .animate-countdown {
            animation: countdown 10s linear forwards;
        }
    </style>
</head>
<body class="bg-accent text-white font-body min-h-screen flex flex-col items-center justify-center p-6 text-center pattern-dots max-w-md mx-auto shadow-2xl overflow-hidden relative">

    <!-- Time Bar -->
    <div class="absolute top-0 left-0 w-full h-2 bg-black/10 z-50">
        <div class="h-full bg-white animate-countdown"></div>
    </div>

    <main class="flex-1 flex flex-col items-center justify-center space-y-12 w-full animate-fade-in">
        <div class="relative w-full px-4">
            <div class="absolute inset-0 bg-white/20 blur-3xl rounded-full scale-110 animate-pulse"></div>
            <h1 class="font-display font-bold text-4xl md:text-5xl drop-shadow-lg leading-tight rotate-[-2deg] uppercase tracking-tight">¡ERES UN<br/>AGENTE!<br/><span class="text-2xl md:text-3xl opacity-80 italic">...¿O NO?</span></h1>
        </div>

        <div class="bg-white text-ink p-8 rounded-card border-4 border-ink shadow-hard-lg w-full relative">
            <div class="absolute -top-6 left-1/2 -translate-x-1/2 bg-accent text-white px-8 py-2 rounded-full font-display font-bold text-xl shadow-hard border-2 border-white uppercase">Tu Palabra</div>
            
            <p class="text-ink/40 text-xs font-bold uppercase tracking-[0.2em] mt-4 mb-2">Secreto de Estado</p>
            <h2 class="text-accent font-display font-bold text-6xl md:text-7xl mb-6 drop-shadow-sm tracking-widest uppercase">LOBO</h2>
            
            <div class="p-4 bg-accent-muted border-2 border-accent/20 rounded-btn">
                <p class="text-accent text-xs font-bold leading-relaxed uppercase tracking-widest text-center">
                    ¿Estás seguro de que tienes la misma palabra que los demás?
                </p>
            </div>
        </div>

        <div class="w-full max-w-xs space-y-4">
            <p class="text-white font-bold uppercase tracking-[0.3em] text-[10px] animate-pulse text-center">Analizando huella semántica...</p>
            <!-- Thin Time Bar -->
            <div class="w-full h-1.5 bg-white/20 rounded-full overflow-hidden">
                <div class="h-full bg-white animate-countdown"></div>
            </div>
        </div>
    </main>

    <footer class="p-6 w-full max-w-md">
        <a href="06_Pistas.html" class="w-full block bg-white text-accent font-display font-bold text-2xl py-5 rounded-btn shadow-hard active:translate-y-1 transition-all uppercase tracking-widest text-center">
            Entendido
        </a>
    </footer>

</body>
</html>
