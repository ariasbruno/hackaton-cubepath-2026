<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victoria del Infiltrado - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "primary-muted": "#FFF0E5",
                        "secondary": "#4D9DE0",
                        "accent": "#87C38F",
                        "danger": "#E63946",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                        "shadow-col": "rgba(43, 45, 66, 0.15)",
                        "sticky-yellow": "#FFD166",
                    },
                    fontFamily: {
                        "display": ["Fredoka One", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.15)',
                        'hard-sm': '2px 2px 0px rgba(43, 45, 66, 0.15)',
                        'hard-lg': '6px 6px 0px rgba(43, 45, 66, 0.15)',
                    },
                    borderRadius: {
                        'card': '24px',
                        'btn': '16px',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-checkers {
            background-image: repeating-linear-gradient(45deg, rgba(0, 0, 0, 0.05) 25px, transparent 25px, transparent 50px, rgba(0, 0, 0, 0.05) 50px, rgba(0, 0, 0, 0.05) 75px, transparent 75px, transparent 100px);
        }
        .paper-tear {
            clip-path: polygon(0% 0%, 100% 0%, 100% 95%, 95% 100%, 85% 92%, 75% 100%, 65% 92%, 55% 100%, 45% 92%, 35% 100%, 25% 92%, 15% 100%, 5% 92%, 0% 100%);
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
    </style>
</head>
<body class="bg-bg-paper min-h-screen flex flex-col font-body">

    <!-- Mobile Block Container -->
    <div class="w-full max-w-md mx-auto min-h-screen bg-accent pattern-checkers shadow-2xl flex flex-col relative overflow-hidden text-center p-6">
        
        <main class="flex-1 relative z-10 flex flex-col items-center justify-center gap-8 animate-fade-in w-full">
            <h1 class="font-display text-5xl md:text-6xl drop-shadow-lg leading-tight rotate-[-3deg] uppercase text-white">¡INFILTRACIÓN<br/>TOTAL!</h1>

            <div class="bg-white text-ink w-full paper-tear shadow-hard-lg p-8 pb-16 relative overflow-hidden">
                <div class="absolute -top-6 left-1/2 -translate-x-1/2 bg-accent text-white px-8 py-2 rounded-full font-display text-xl shadow-hard border-2 border-white uppercase">Victoria</div>
                
                <div class="flex flex-col items-center mt-6">
                    <!-- Infiltrator Icon -->
                    <div class="w-32 h-32 bg-accent/10 rounded-full border-4 border-ink shadow-hard flex items-center justify-center mb-6 relative overflow-hidden group">
                        <div class="absolute inset-0 bg-accent/20 animate-pulse"></div>
                        <span class="material-symbols-outlined text-[80px] text-accent drop-shadow-sm">theater_comedy</span>
                    </div>

                    <h2 class="font-display text-4xl mb-1 uppercase tracking-tight text-ink leading-none">ANA</h2>
                    <p class="text-ink/40 text-[10px] font-extrabold uppercase tracking-[0.2em] mb-8">Maestra del Mimetismo</p>
                    
                    <div class="w-full space-y-3">
                        <div class="flex justify-between items-center bg-accent-muted p-4 rounded-btn border-2 border-accent/10 shadow-hard-sm">
                            <span class="text-accent font-extrabold uppercase tracking-widest text-[10px]">Supervivencia Sutil</span>
                            <span class="text-accent font-display text-2xl">+600</span>
                        </div>
                        <div class="flex justify-between items-center bg-accent-muted p-4 rounded-btn border-2 border-accent/10 shadow-hard-sm">
                            <span class="text-accent font-extrabold uppercase tracking-widest text-[10px]">Bono de Engaño</span>
                            <span class="text-accent font-display text-2xl">+300</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-4 w-full text-left">
                <a href="09_Results_Points.html" class="w-full block bg-white text-accent font-display text-2xl py-5 rounded-btn shadow-hard active:translate-y-1 transition-all uppercase tracking-widest text-center">
                    Ver Puntos
                </a>
                <a href="04_Lobby_Cercanas.html" class="w-full block bg-ink text-white font-display text-lg py-4 rounded-btn shadow-hard active:translate-y-1 transition-all uppercase tracking-widest text-center">
                    Volver al Lobby
                </a>
            </div>
        </main>

    </div>

</body>
</html>
