<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asignación Agente (Desktop) - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:wght@200..800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "primary-muted": "#FFF0E5",
                        "secondary": "#4D9DE0",
                        "accent": "#87C38F",
                        "accent-muted": "#F0F9F1",
                        "danger": "#E63946",
                        "purple": "#9D4EDD",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                        "shadow-col": "rgba(43, 45, 66, 0.15)",
                    },
                    fontFamily: {
                        "display": ["Fredoka", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.15)',
                        'hard-lg': '8px 8px 0px rgba(43, 45, 66, 0.15)',
                    },
                    borderRadius: {
                        'card': '32px',
                        'btn': '20px',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-dots {
            background-image: radial-gradient(rgba(255, 255, 255, 0.2) 2px, transparent 2px);
            background-size: 40px 40px;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
        
        @keyframes countdown {
            from { width: 100%; }
            to { width: 0%; }
        }
        .animate-countdown {
            animation: countdown 10s linear forwards;
        }
        
        .floating {
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0) rotate(2deg); }
            50% { transform: translateY(-20px) rotate(-1deg); }
        }
    </style>
</head>
<body class="bg-accent text-white font-body min-h-screen flex flex-col items-center justify-between p-12 text-center pattern-dots overflow-hidden relative">

    <!-- Decorative Elements -->
    <div class="absolute top-20 left-20 w-32 h-32 bg-white/10 rounded-full blur-3xl animate-pulse"></div>
    <div class="absolute bottom-20 right-20 w-64 h-64 bg-white/10 rounded-full blur-3xl animate-pulse"></div>

    <header class="w-full max-w-6xl flex justify-between items-start z-10">
        <div class="bg-white/20 backdrop-blur-md px-6 py-3 rounded-full border-2 border-white/30 flex items-center gap-3 shadow-hard">
            <span class="material-symbols-outlined text-white">shield</span>
            <span class="font-display text-xl uppercase tracking-widest">Misión en Curso</span>
        </div>
        <div class="text-right">
            <p class="text-xs font-bold uppercase tracking-[0.3em] opacity-60 mb-1">Tu Identidad es</p>
            <p class="font-display text-4xl uppercase">Clasificada</p>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center space-y-16 w-full max-w-4xl z-10">
        <div class="relative group">
            <h1 class="font-display font-black text-8xl md:text-9xl drop-shadow-2xl leading-tight rotate-[-2deg] uppercase group-hover:rotate-0 transition-transform duration-500 cursor-default">
                ¡ERES UN<br/><span class="text-ink bg-white px-8 py-2 inline-block mt-4 shadow-hard-lg">AGENTE!</span>
            </h1>
        </div>

        <div class="bg-white text-ink p-12 rounded-card border-8 border-ink shadow-hard-lg w-full max-w-2xl relative floating">
            <div class="absolute -top-8 left-1/2 -translate-x-1/2 bg-accent text-white px-12 py-3 rounded-full font-display font-bold text-2xl shadow-hard border-4 border-white uppercase tracking-tighter">
                Tu Palabra Secreta
            </div>
            
            <div class="mt-8 mb-10">
                <p class="text-ink/30 text-sm font-bold uppercase tracking-[0.4em] mb-4">Solo para tus ojos</p>
                <h2 class="text-accent font-display font-bold text-8xl md:text-9xl drop-shadow-sm tracking-widest uppercase">PIZZA</h2>
            </div>
            
            <div class="p-8 bg-accent-muted border-4 border-accent/20 rounded-card flex items-center gap-6 text-left">
                <div class="bg-accent text-white p-4 rounded-2xl shadow-hard">
                    <span class="material-symbols-outlined text-4xl">lightbulb</span>
                </div>
                <div>
                    <h3 class="font-display text-xl uppercase text-accent mb-1">Tu Objetivo</h3>
                    <p class="text-ink/70 text-lg font-bold leading-tight uppercase tracking-tight">
                        Da pistas sutiles. Identifica al impostor antes de que adivine la palabra.
                    </p>
                </div>
            </div>
        </div>

        <div class="w-full max-w-md space-y-6">
            <p class="text-white font-display uppercase tracking-[0.4em] text-sm animate-pulse">Sincronizando con el Cuartel General...</p>
            <div class="w-full h-4 bg-white/20 rounded-full border-2 border-white/30 overflow-hidden shadow-inner">
                <div class="h-full bg-white animate-countdown shadow-[0_0_20px_rgba(255,255,255,0.5)]"></div>
            </div>
        </div>
    </main>

    <footer class="w-full max-w-md z-10 pb-4">
        <a href="06_Pistas_Desktop.html" class="group relative w-full block">
            <div class="absolute inset-0 bg-ink translate-x-2 translate-y-2 rounded-btn transition-transform group-hover:translate-x-1 group-hover:translate-y-1"></div>
            <div class="relative bg-white text-accent font-display font-bold text-4xl py-6 rounded-btn border-4 border-ink transition-all group-hover:-translate-x-1 group-hover:-translate-y-1 group-active:translate-x-0 group-active:translate-y-0 uppercase tracking-widest text-center">
                Entendido
            </div>
        </a>
    </footer>

</body>
</html>
