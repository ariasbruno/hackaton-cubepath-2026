<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suspenso Eliminación - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "primary-muted": "#FFF0E5",
                        "secondary": "#4D9DE0",
                        "accent": "#87C38F",
                        "danger": "#E63946",
                        "danger-muted": "#FFF0F1",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                        "shadow-col": "rgba(43, 45, 66, 0.15)",
                    },
                    fontFamily: {
                        "display": ["Fredoka One", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.15)',
                        'hard-sm': '2px 2px 0px rgba(43, 45, 66, 0.15)',
                        'hard-lg': '6px 6px 0px rgba(43, 45, 66, 0.15)',
                        'inner-hard': 'inset 3px 3px 0px rgba(0,0,0,0.1)',
                    },
                    borderRadius: {
                        'card': '24px',
                        'btn': '16px',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-checkers {
            background-image: repeating-linear-gradient(45deg, rgba(0, 0, 0, 0.1) 25px, transparent 25px, transparent 50px, rgba(0, 0, 0, 0.1) 50px, rgba(0, 0, 0, 0.1) 75px, transparent 75px, transparent 100px);
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
        
        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .animate-heartbeat { animation: heartbeat 0.8s infinite; }

        @keyframes countdown {
            from { width: 100%; }
            to { width: 0%; }
        }
        .animate-countdown {
            animation: countdown 5s linear forwards;
        }
        
        .spotlight {
            background: radial-gradient(circle at center, transparent 0%, rgba(43, 45, 66, 0.9) 80%);
        }
    </style>
</head>
<body class="bg-ink text-white font-body min-h-screen flex flex-col items-center justify-center p-6 text-center pattern-checkers max-w-md mx-auto shadow-2xl overflow-hidden relative">

    <div class="absolute inset-0 spotlight z-0"></div>

    <main class="flex-1 flex flex-col items-center justify-center space-y-12 w-full animate-fade-in relative z-10">
        <div class="space-y-2">
            <h1 class="font-display text-4xl md:text-5xl drop-shadow-lg leading-tight uppercase tracking-tight text-danger animate-pulse">¿QUIÉN<br/>SERÁ?</h1>
            <p class="text-white/40 font-bold uppercase tracking-[0.3em] text-[10px]">Analizando veredicto del grupo</p>
        </div>

        <!-- The Target Card -->
        <div class="relative w-full max-w-xs">
            <!-- Pulse rings -->
            <div class="absolute inset-0 bg-danger/20 rounded-full scale-125 animate-ping"></div>
            
            <div class="bg-white text-ink p-8 rounded-card border-4 border-ink shadow-hard-lg relative z-10 animate-heartbeat">
                <div class="w-32 h-32 bg-primary rounded-full border-4 border-ink shadow-hard flex items-center justify-center mx-auto mb-6 relative overflow-hidden">
                    <span class="text-7xl">🐱</span>
                    <!-- Target Overlay -->
                    <div class="absolute inset-0 flex items-center justify-center bg-danger/20 backdrop-blur-[1px]">
                        <span class="material-symbols-outlined text-white text-6xl opacity-80">target</span>
                    </div>
                </div>
                
                <h2 class="font-display text-5xl mb-1 uppercase tracking-tight">BRUNO</h2>
                
                <div class="mt-4 bg-danger text-white px-6 py-2 rounded-full font-display text-xl shadow-hard border-2 border-white inline-block uppercase italic rotate-[-2deg]">
                    4 Votos
                </div>
            </div>
        </div>

        <div class="w-full max-w-xs space-y-4">
            <p class="text-white font-bold uppercase tracking-[0.3em] text-[10px] animate-pulse">Preparando revelación de identidad...</p>
            <!-- Thin Time Bar -->
            <div class="w-full h-1.5 bg-white/10 rounded-full overflow-hidden">
                <div class="h-full bg-danger animate-countdown"></div>
            </div>
        </div>
    </main>

    <footer class="p-6 w-full relative z-10">
        <!-- Buttons hidden during suspense or used for dev -->
        <div class="flex gap-4">
            <a href="08_Elimination_Agente.html" class="flex-1 bg-white/5 border border-white/10 text-white/20 py-3 rounded-btn text-[8px] font-bold uppercase tracking-widest">Inocente</a>
            <a href="08_Elimination_Impostor.html" class="flex-1 bg-white/5 border border-white/10 text-white/20 py-3 rounded-btn text-[8px] font-bold uppercase tracking-widest">Culpable</a>
        </div>
    </footer>

</body>
</html>
