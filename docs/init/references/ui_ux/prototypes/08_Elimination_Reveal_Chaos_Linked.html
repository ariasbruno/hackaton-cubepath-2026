<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revelación Caos - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:wght@200..800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "secondary": "#4D9DE0",
                        "accent": "#87C38F",
                        "danger": "#E63946",
                        "purple": "#9D4EDD",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                    },
                    fontFamily: {
                        "display": ["Fredoka", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.15)',
                        'hard-lg': '8px 8px 0px rgba(43, 45, 66, 0.3)',
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes spotlight {
            0% { opacity: 0; transform: scale(0.8); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }
        @keyframes reveal-bg-purple {
            0% { background-color: #2B2D42; }
            100% { background-color: #9D4EDD; }
        }
        @keyframes stamp-purple {
            0% { transform: scale(5); opacity: 0; }
            100% { transform: scale(1) rotate(2deg); opacity: 1; }
        }
        @keyframes link-stretch {
            0% { width: 0; opacity: 0; }
            100% { width: 100%; opacity: 1; }
        }
        @keyframes heartbeat-double {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .animate-spotlight { animation: spotlight 1s ease-out forwards; }
        .animate-reveal-bg { animation: reveal-bg-purple 0.5s 3.5s forwards; }
        .animate-stamp { opacity: 0; animation: stamp-purple 0.4s 4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-link { animation: link-stretch 0.8s 4.5s ease-in-out forwards; width: 0; opacity: 0; }
        .animate-pulse-slow { animation: heartbeat-double 2s infinite; }
        
        .delay-1 { animation-delay: 1s; }
        .delay-2 { animation-delay: 2s; }

        .pattern-checkers {
            background-image: repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.05) 25px, transparent 25px, transparent 50px, rgba(255, 255, 255, 0.05) 50px, rgba(255, 255, 255, 0.05) 75px, transparent 75px, transparent 100px);
        }
    </style>
</head>
<body class="bg-ink text-white font-body min-h-screen flex flex-col items-center justify-center overflow-hidden animate-reveal-bg">
    
    <div class="absolute inset-0 pattern-checkers opacity-10"></div>

    <!-- Escena de Revelación de Vínculo -->
    <main class="relative z-10 flex flex-col items-center gap-12 w-full max-w-lg p-6">
        
        <!-- Fase 1: El Título -->
        <div class="text-center space-y-2">
            <p class="font-display text-lg uppercase tracking-[0.4em] opacity-0 animate-spotlight">Detectando sincronía...</p>
            <h1 class="font-display text-5xl uppercase tracking-tighter opacity-0 animate-spotlight delay-1">VÍNCULO EXPUESTO</h1>
        </div>

        <!-- Fase 2: Los dos jugadores vinculados -->
        <div class="w-full flex items-center justify-between relative px-4">
            
            <!-- Conector (Cadena) -->
            <div class="absolute top-1/2 left-0 w-full h-2 bg-white/20 -translate-y-1/2 z-0 overflow-hidden rounded-full">
                <div class="h-full bg-white animate-link"></div>
            </div>

            <!-- Jugador 1 -->
            <div class="relative z-10 animate-spotlight delay-2">
                <div class="bg-white p-1 rounded-full border-4 border-ink shadow-hard animate-pulse-slow">
                    <div class="w-24 h-24 rounded-full overflow-hidden bg-primary flex items-center justify-center border-2 border-ink">
                        <span class="text-5xl">🐱</span>
                    </div>
                </div>
                <p class="mt-2 font-display text-center text-sm uppercase">Félix</p>
            </div>

            <!-- Icono de Vínculo Central -->
            <div class="relative z-20 opacity-0 animate-stamp" style="animation-delay: 4.2s">
                <div class="bg-ink text-white w-12 h-12 rounded-full flex items-center justify-center border-4 border-white shadow-hard">
                    <span class="material-symbols-outlined text-2xl">link</span>
                </div>
            </div>

            <!-- Jugador 2 -->
            <div class="relative z-10 animate-spotlight delay-2">
                <div class="bg-white p-1 rounded-full border-4 border-ink shadow-hard animate-pulse-slow">
                    <div class="w-24 h-24 rounded-full overflow-hidden bg-secondary flex items-center justify-center border-2 border-ink">
                        <span class="text-5xl">🦊</span>
                    </div>
                </div>
                <p class="mt-2 font-display text-center text-sm uppercase">Ana</p>
            </div>
        </div>

        <!-- Fase 3: El Sello y la Palabra Común -->
        <div class="flex flex-col items-center gap-6">
            <div class="opacity-0 animate-stamp">
                <div class="bg-white text-purple px-10 py-4 border-4 border-ink shadow-hard rounded-2xl rotate-[2deg]">
                    <p class="text-[10px] font-black uppercase tracking-widest text-purple/40 mb-1 text-center">Palabra Compartida</p>
                    <p class="font-display text-5xl uppercase leading-none">RAYO</p>
                </div>
            </div>
            
            <p class="font-display text-xl uppercase tracking-widest text-white/80 opacity-0 animate-stamp" style="animation-delay: 4.8s">
                ¡Se han encontrado!
            </p>
        </div>

    </main>

    <!-- Botón para continuar -->
    <footer class="absolute bottom-10 w-full max-w-xs px-6 opacity-0 animate-stamp" style="animation-delay: 5.5s">
        <a href="09_Results_Points.html" class="w-full block bg-white text-ink font-display text-2xl py-5 rounded-xl shadow-hard hover:translate-y-1 active:translate-y-2 active:shadow-none transition-all text-center uppercase tracking-widest">
            Siguiente Ronda
        </a>
    </footer>

</body>
</html>
