<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votación Caos - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "primary-muted": "#FFF0E5",
                        "secondary": "#4D9DE0",
                        "secondary-muted": "#EBF5FF",
                        "accent": "#87C38F",
                        "danger": "#E63946",
                        "purple": "#9D4EDD",
                        "purple-muted": "#F5E6FF",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                        "shadow-col": "rgba(43, 45, 66, 0.15)",
                    },
                    fontFamily: {
                        "display": ["Fredoka One", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.15)',
                        'hard-sm': '2px 2px 0px rgba(43, 45, 66, 0.15)',
                        'hard-lg': '6px 6px 0px rgba(43, 45, 66, 0.15)',
                    },
                    borderRadius: {
                        'card': '24px',
                        'btn': '16px',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-checkers {
            background-image: repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.05) 25px, transparent 25px, transparent 50px, rgba(255, 255, 255, 0.05) 50px, rgba(255, 255, 255, 0.05) 75px, transparent 75px, transparent 100px);
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .paper-card { transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); }
        .paper-card:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px rgba(43, 45, 66, 0.15); }

        @keyframes countdown {
            from { width: 100%; }
            to { width: 0%; }
        }
        .animate-countdown {
            animation: countdown 45s linear forwards;
        }
    </style>
</head>
<body class="bg-purple text-white font-body min-h-screen flex flex-col pattern-checkers max-w-md mx-auto shadow-2xl overflow-hidden relative">

    <!-- Header -->
    <header class="p-6 bg-white border-b border-ink/5 flex items-center justify-between shadow-[0_4px_20px_rgba(43,45,66,0.05)] z-30">
        <div class="flex flex-col">
            <h1 class="font-display text-2xl text-purple uppercase tracking-tight leading-none">Resolución</h1>
            <p class="text-[10px] font-extrabold uppercase opacity-40 tracking-[0.2em] mt-1 text-ink">Modo Caos ⚡</p>
        </div>
        <div class="bg-purple-muted px-4 py-2 rounded-full border-2 border-purple/10 flex items-center gap-2">
            <span class="material-symbols-outlined text-purple text-sm">timer</span>
            <span class="font-mono font-bold text-purple text-sm uppercase">00:45</span>
        </div>
    </header>

    <!-- Action Toggles -->
    <div class="bg-white/10 backdrop-blur-md p-4 border-b border-white/10 flex flex-col gap-4">
        <div class="grid grid-cols-2 gap-2">
            <button onclick="setMode('link')" id="btn-link" class="bg-white p-3 rounded-btn border-4 border-secondary shadow-hard flex flex-col items-center gap-1 transition-all">
                <span class="material-symbols-outlined text-secondary">link</span>
                <span class="text-[10px] font-bold text-ink uppercase tracking-tighter leading-none">Vincular</span>
            </button>
            <button onclick="setMode('accuse')" id="btn-accuse" class="bg-white/20 p-3 rounded-btn border-2 border-white/10 shadow-sm flex flex-col items-center gap-1 transition-all opacity-60">
                <span class="material-symbols-outlined text-white/40">person_search</span>
                <span class="text-[10px] font-bold text-white/40 uppercase tracking-tighter leading-none">Acusar</span>
            </button>
        </div>
        
        <div class="flex flex-col items-center gap-2">
            <p id="instruction-text" class="text-[10px] font-bold uppercase tracking-[0.2em] text-white/80">Selecciona a 1 persona para vincularte</p>
            <!-- Thin Time Bar -->
            <div class="w-48 h-1.5 bg-white/10 rounded-full overflow-hidden">
                <div class="h-full bg-white animate-countdown"></div>
            </div>
        </div>
    </div>

    <!-- Main Content: Players Grid -->
    <main class="flex-1 p-6 overflow-y-auto no-scrollbar">
        <div class="grid grid-cols-2 gap-6">
            <!-- Player Item -->
            <label class="block relative cursor-pointer group">
                <input type="checkbox" name="vote" class="peer hidden">
                <div class="bg-white p-5 rounded-card border-4 border-ink/5 shadow-hard peer-checked:border-secondary peer-checked:bg-secondary-muted transition-all paper-card flex flex-col items-center gap-3">
                    <div class="w-20 h-20 bg-primary rounded-full border-4 border-white shadow-hard flex items-center justify-center text-4xl shrink-0 transition-transform group-hover:scale-105">
                        🐱
                    </div>
                    <div class="text-center">
                        <h3 class="font-display text-lg uppercase tracking-tight leading-none text-ink">Bruno</h3>
                        <p class="text-[8px] font-bold uppercase text-ink/40 mt-1">Host</p>
                    </div>
                </div>
                <!-- Selection Indicator -->
                <div class="absolute -top-2 -right-2 w-8 h-8 bg-secondary text-white rounded-full flex items-center justify-center border-4 border-white shadow-hard-sm opacity-0 peer-checked:opacity-100 transition-opacity">
                    <span class="material-symbols-outlined text-sm">check</span>
                </div>
            </label>

            <!-- Other Players... -->
            <label class="block relative cursor-pointer group">
                <input type="checkbox" name="vote" class="peer hidden">
                <div class="bg-white p-5 rounded-card border-4 border-ink/5 shadow-hard peer-checked:border-secondary peer-checked:bg-secondary-muted transition-all paper-card flex flex-col items-center gap-3">
                    <div class="w-20 h-20 bg-secondary rounded-full border-4 border-white shadow-hard flex items-center justify-center text-4xl shrink-0 transition-transform group-hover:scale-105">
                        🦊
                    </div>
                    <div class="text-center">
                        <h3 class="font-display text-lg uppercase tracking-tight leading-none text-ink">Ana</h3>
                        <p class="text-[8px] font-bold uppercase text-ink/40 mt-1">Invitado</p>
                    </div>
                </div>
                <div class="absolute -top-2 -right-2 w-8 h-8 bg-secondary text-white rounded-full flex items-center justify-center border-4 border-white shadow-hard-sm opacity-0 peer-checked:opacity-100 transition-opacity">
                    <span class="material-symbols-outlined text-sm">check</span>
                </div>
            </label>

            <label class="block relative cursor-pointer group">
                <input type="checkbox" name="vote" class="peer hidden">
                <div class="bg-white p-5 rounded-card border-4 border-ink/5 shadow-hard peer-checked:border-secondary peer-checked:bg-secondary-muted transition-all paper-card flex flex-col items-center gap-3">
                    <div class="w-20 h-20 bg-accent rounded-full border-4 border-white shadow-hard flex items-center justify-center text-4xl shrink-0 transition-transform group-hover:scale-105">
                        🤖
                    </div>
                    <div class="text-center">
                        <h3 class="font-display text-lg uppercase tracking-tight leading-none text-ink">Luis</h3>
                        <p class="text-[8px] font-bold uppercase text-ink/40 mt-1">Invitado</p>
                    </div>
                </div>
                <div class="absolute -top-2 -right-2 w-8 h-8 bg-secondary text-white rounded-full flex items-center justify-center border-4 border-white shadow-hard-sm opacity-0 peer-checked:opacity-100 transition-opacity">
                    <span class="material-symbols-outlined text-sm">check</span>
                </div>
            </label>

            <label class="block relative cursor-pointer group">
                <input type="checkbox" name="vote" class="peer hidden">
                <div class="bg-white p-5 rounded-card border-4 border-ink/5 shadow-hard peer-checked:border-secondary peer-checked:bg-secondary-muted transition-all paper-card flex flex-col items-center gap-3">
                    <div class="w-20 h-20 bg-neutral rounded-full border-4 border-white shadow-hard flex items-center justify-center text-4xl shrink-0 transition-transform group-hover:scale-105" style="background-color: #A066F1;">
                        👾
                    </div>
                    <div class="text-center">
                        <h3 class="font-display text-lg uppercase tracking-tight leading-none text-ink">Sara</h3>
                        <p class="text-[8px] font-bold uppercase text-ink/40 mt-1">Invitado</p>
                    </div>
                </div>
                <div class="absolute -top-2 -right-2 w-8 h-8 bg-secondary text-white rounded-full flex items-center justify-center border-4 border-white shadow-hard-sm opacity-0 peer-checked:opacity-100 transition-opacity">
                    <span class="material-symbols-outlined text-sm">check</span>
                </div>
            </label>
        </div>
    </main>

    <!-- Footer Actions -->
    <footer class="p-6 bg-white/10 backdrop-blur-md border-t border-white/10 rounded-t-[32px] space-y-4 pb-10">
        <button class="w-full bg-white text-purple font-display text-2xl py-5 rounded-btn shadow-hard-lg active:translate-y-1 active:shadow-none transition-all uppercase tracking-widest text-center flex items-center justify-center gap-3">
            Confirmar Jugada
            <span class="material-symbols-outlined text-2xl">fingerprint</span>
        </button>

        <button class="w-full bg-white/5 border-2 border-white/10 text-white/40 font-display py-4 rounded-btn shadow-hard active:translate-y-1 transition-all text-center uppercase tracking-widest flex items-center justify-center gap-2">
            Saltar Fase
            <span class="text-[10px] font-extrabold bg-purple-muted text-purple px-2 py-0.5 rounded-full border border-purple/10">+5 PTS</span>
        </button>
    </footer>

    <script>
        function setMode(mode) {
            const btnLink = document.getElementById('btn-link');
            const btnAccuse = document.getElementById('btn-accuse');
            const instruction = document.getElementById('instruction-text');
            const items = document.querySelectorAll('.peer-checked\\:border-secondary');
            const checks = document.querySelectorAll('.bg-secondary.text-white');

            if (mode === 'link') {
                btnLink.className = "bg-white p-3 rounded-btn border-4 border-secondary shadow-hard flex flex-col items-center gap-1 transition-all";
                btnAccuse.className = "bg-white/20 p-3 rounded-btn border-2 border-white/10 shadow-sm flex flex-col items-center gap-1 transition-all opacity-60";
                instruction.innerText = "Selecciona a 1 persona para vincularte";
                
                // Change selection colors to Blue
                items.forEach(el => {
                    el.classList.replace('peer-checked:border-danger', 'peer-checked:border-secondary');
                    el.classList.replace('peer-checked:bg-danger-muted', 'peer-checked:bg-secondary-muted');
                });
                checks.forEach(el => el.classList.replace('bg-danger', 'bg-secondary'));
            } else {
                btnAccuse.className = "bg-white p-3 rounded-btn border-4 border-danger shadow-hard flex flex-col items-center gap-1 transition-all";
                btnLink.className = "bg-white/20 p-3 rounded-btn border-2 border-white/10 shadow-sm flex flex-col items-center gap-1 transition-all opacity-60";
                instruction.innerText = "Selecciona a 2 personas para acusarlas";

                // Change selection colors to Red
                items.forEach(el => {
                    el.classList.replace('peer-checked:border-secondary', 'peer-checked:border-danger');
                    el.classList.replace('peer-checked:bg-secondary-muted', 'peer-checked:bg-danger-muted');
                });
                checks.forEach(el => el.classList.replace('bg-secondary', 'bg-danger'));
            }
        }
    </script>

</body>
</html>
