<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revelar Rol (Desktop) - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:wght@200..800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "primary-muted": "#FFF0E5",
                        "secondary": "#4D9DE0",
                        "accent": "#87C38F",
                        "danger": "#E63946",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                        "shadow-col": "rgba(43, 45, 66, 0.15)",
                    },
                    fontFamily: {
                        "display": ["Fredoka", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.15)',
                        'hard-lg': '8px 8px 0px rgba(43, 45, 66, 0.15)',
                    },
                    borderRadius: {
                        'card': '32px',
                        'btn': '20px',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-dots {
            background-image: radial-gradient(rgba(43, 45, 66, 0.1) 2px, transparent 2px);
            background-size: 40px 40px;
        }
        .pattern-checkers {
            background-image: repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.1) 25px, transparent 25px, transparent 50px, rgba(255, 255, 255, 0.1) 50px, rgba(255, 255, 255, 0.1) 75px, transparent 75px, transparent 100px);
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
        
        @keyframes countdown {
            from { width: 100%; }
            to { width: 0%; }
        }
        .animate-countdown {
            animation: countdown 10s linear forwards;
        }

        /* CARD FLIP LOGIC */
        .perspective-2000 { perspective: 2000px; }
        .card-inner {
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }
        .card-flipped { transform: rotateY(180deg); }
        .card-front, .card-back {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .card-back { transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-bg-paper text-ink font-body min-h-screen flex flex-col items-center justify-between p-12 text-center pattern-dots overflow-hidden relative">

    <header class="w-full max-w-6xl flex justify-between items-start z-10">
        <div class="bg-white px-8 py-3 rounded-full border-4 border-ink flex items-center gap-3 shadow-hard rotate-[-1deg]">
            <span class="material-symbols-outlined text-primary font-bold">lock_open</span>
            <span class="font-display text-xl uppercase tracking-widest">Identificación Local</span>
        </div>
        <div class="text-right">
            <p class="text-xs font-bold uppercase tracking-[0.3em] text-ink/40 mb-1">Cargando perfil de</p>
            <p class="font-display text-4xl uppercase text-ink">Bruno</p>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center space-y-12 w-full max-w-4xl z-10">
        
        <div class="space-y-4">
            <h1 class="font-display text-5xl uppercase tracking-tighter text-ink/40">Hola, <span class="text-ink">BRUNO</span></h1>
            <p class="text-lg font-bold uppercase tracking-[0.4em] text-ink/20 animate-bounce">Toca la carta para revelar tu destino</p>
        </div>

        <!-- 3D Flipping Card (Desktop Size) -->
        <div class="relative w-[400px] h-[550px] perspective-2000 cursor-pointer group" onclick="this.querySelector('.card-inner').classList.toggle('card-flipped')">
            <div class="card-inner relative w-full h-full shadow-hard-lg rounded-card">
                
                <!-- Front (Hidden State) -->
                <div class="card-front absolute inset-0 bg-primary rounded-card border-[12px] border-white flex flex-col items-center justify-center text-white overflow-hidden">
                    <div class="absolute inset-0 pattern-checkers opacity-20"></div>
                    <div class="absolute inset-6 border-4 border-white/40 border-dashed rounded-[20px]"></div>
                    
                    <div class="bg-white/20 p-10 rounded-full backdrop-blur-sm mb-8 animate-pulse">
                        <span class="material-symbols-outlined text-9xl drop-shadow-2xl">question_mark</span>
                    </div>
                    
                    <p class="font-display text-4xl uppercase tracking-[0.2em] drop-shadow-lg">REVELAR</p>
                    <p class="mt-4 text-xs font-bold uppercase tracking-[0.5em] opacity-60">Solo para tus ojos</p>
                </div>

                <!-- Back (Role State) -->
                <div class="card-back absolute inset-0 bg-white rounded-card border-[12px] border-accent flex flex-col items-center justify-center p-12">
                    <div class="absolute inset-0 pattern-dots opacity-10"></div>
                    
                    <div class="w-32 h-32 bg-accent text-white rounded-3xl flex items-center justify-center mb-10 shadow-hard rotate-3">
                        <span class="material-symbols-outlined text-7xl font-bold">shield_person</span>
                    </div>
                    
                    <h2 class="font-display text-7xl text-accent uppercase leading-none mb-4 drop-shadow-sm tracking-tighter">AGENTE</h2>
                    
                    <div class="w-full h-1 bg-accent/10 my-8 rounded-full"></div>
                    
                    <div class="space-y-2">
                        <p class="text-ink/30 text-sm font-bold uppercase tracking-[0.4em]">Tu Palabra Secreta:</p>
                        <h3 class="font-display text-8xl text-ink uppercase tracking-[0.1em] drop-shadow-sm">PIZZA</h3>
                    </div>
                    
                    <p class="mt-12 text-ink/20 text-xs font-bold uppercase tracking-[0.3em] animate-pulse italic">Toca para ocultar de nuevo</p>
                </div>

            </div>
            
            <!-- Decorative Stack Effect -->
            <div class="absolute top-4 left-4 w-full h-full bg-black/5 rounded-card -z-10 rotate-3 transition-transform group-hover:rotate-6"></div>
            <div class="absolute top-2 left-2 w-full h-full bg-black/5 rounded-card -z-20 -rotate-2 transition-transform group-hover:-rotate-4"></div>
        </div>

        <div class="w-full max-w-md space-y-6">
            <p class="text-ink/40 font-display uppercase tracking-[0.4em] text-sm animate-pulse">Memorizando palabra de seguridad...</p>
            <div class="w-full h-4 bg-ink/5 rounded-full border-2 border-ink/10 overflow-hidden shadow-inner">
                <div class="h-full bg-primary animate-countdown"></div>
            </div>
        </div>

    </main>

    <footer class="w-full max-w-md z-10 pb-4">
        <a href="05_Local_PassPhone_Desktop.html" class="group relative w-full block">
            <div class="absolute inset-0 bg-ink translate-x-2 translate-y-2 rounded-btn transition-transform group-hover:translate-x-1 group-hover:translate-y-1"></div>
            <div class="relative bg-white text-ink font-display font-bold text-4xl py-8 rounded-btn border-4 border-ink transition-all group-hover:-translate-x-1 group-hover:-translate-y-1 group-active:translate-x-0 group-active:translate-y-0 uppercase tracking-widest text-center">
                Listo, Siguiente
            </div>
        </a>
    </footer>

</body>
</html>
