<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votación - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "primary-muted": "#FFF0E5",
                        "secondary": "#4D9DE0",
                        "secondary-muted": "#EBF5FF",
                        "accent": "#87C38F",
                        "accent-muted": "#F0F9F1",
                        "danger": "#E63946",
                        "danger-muted": "#FFF0F1",
                        "purple": "#9D4EDD",
                        "ink": "#2B2D42",
                        "ink-muted": "#8D8FA1",
                        "bg-paper": "#FDFBF7",
                        "shadow-col": "rgba(43, 45, 66, 0.15)",
                        "sticky-yellow": "#FFD166",
                    },
                    fontFamily: {
                        "display": ["Fredoka One", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                        "mono": ["Varela Round", "monospace"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.15)',
                        'hard-sm': '2px 2px 0px rgba(43, 45, 66, 0.15)',
                        'hard-lg': '6px 6px 0px rgba(43, 45, 66, 0.15)',
                        'inner-hard': 'inset 3px 3px 0px rgba(0,0,0,0.1)',
                    },
                    borderRadius: {
                        'card': '24px',
                        'btn': '16px',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-dots {
            background-image: radial-gradient(rgba(43, 45, 66, 0.1) 1.5px, transparent 1.5px);
            background-size: 20px 20px;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes countdown {
            from { width: 100%; }
            to { width: 0%; }
        }
        .animate-countdown {
            animation: countdown 30s linear forwards;
        }
        .paper-card { transition: all 0.1s ease; }
        .paper-card:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px rgba(43, 45, 66, 0.15); }
    </style>
</head>
<body class="bg-bg-paper text-ink font-body min-h-screen flex flex-col pattern-dots max-w-md mx-auto shadow-2xl relative overflow-hidden">

    <!-- Header -->
    <header class="p-6 bg-white border-b border-ink/5 flex flex-col gap-4 shadow-[0_4px_20px_rgba(43,45,66,0.05)] sticky top-0 z-30">
        <div class="flex items-center justify-between">
            <div class="flex flex-col">
                <h1 class="font-display text-2xl text-danger uppercase tracking-tight leading-none">¿Quién miente?</h1>
                <p class="text-[10px] font-extrabold uppercase opacity-40 tracking-[0.2em] mt-1">Fase de Votación</p>
            </div>
            <div class="bg-danger-muted px-4 py-2 rounded-full border-2 border-danger/10 flex items-center gap-2">
                <span class="material-symbols-outlined text-danger text-sm">how_to_vote</span>
                <span class="font-mono font-bold text-danger text-sm uppercase">00:25</span>
            </div>
        </div>
    </header>

    <!-- Instruction & Progress -->
    <div class="bg-white/80 backdrop-blur-sm p-4 border-b border-ink/5 flex flex-col items-center gap-2">
        <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-ink/40">Toca un avatar para seleccionarlo</p>
        <!-- Thin Time Bar -->
        <div class="w-48 h-1.5 bg-ink/5 rounded-full overflow-hidden">
            <div class="h-full bg-danger animate-countdown"></div>
        </div>
    </div>

    <!-- Main Content: Players Grid -->
    <main class="flex-1 p-6 overflow-y-auto no-scrollbar">
        <div class="grid grid-cols-2 gap-6">
            <!-- Selected Player -->
            <label class="block relative cursor-pointer group">
                <input type="radio" name="vote" class="peer hidden" checked>
                <div class="bg-white p-5 rounded-card border-4 border-ink/5 shadow-hard peer-checked:border-danger peer-checked:bg-danger-muted transition-all paper-card flex flex-col items-center gap-3">
                    <div class="w-20 h-20 bg-primary rounded-full border-4 border-white shadow-hard flex items-center justify-center text-4xl shrink-0 transition-transform group-hover:scale-105">
                        🐱
                    </div>
                    <div class="text-center">
                        <h3 class="font-display text-lg uppercase tracking-tight leading-none">Bruno</h3>
                        <p class="text-[8px] font-bold uppercase opacity-40 mt-1">Host</p>
                    </div>
                </div>
                <!-- Selection Badge -->
                <div class="absolute -top-2 -right-2 w-8 h-8 bg-danger text-white rounded-full flex items-center justify-center border-4 border-white shadow-hard-sm opacity-0 peer-checked:opacity-100 transition-opacity">
                    <span class="material-symbols-outlined text-sm">check</span>
                </div>
            </label>

            <!-- Other Player -->
            <label class="block relative cursor-pointer group">
                <input type="radio" name="vote" class="peer hidden">
                <div class="bg-white p-5 rounded-card border-4 border-ink/5 shadow-hard peer-checked:border-danger peer-checked:bg-danger-muted transition-all paper-card flex flex-col items-center gap-3">
                    <div class="w-20 h-20 bg-secondary rounded-full border-4 border-white shadow-hard flex items-center justify-center text-4xl shrink-0 transition-transform group-hover:scale-105" style="background-color: #4D9DE0;">
                        🦊
                    </div>
                    <div class="text-center">
                        <h3 class="font-display text-lg uppercase tracking-tight leading-none">Ana</h3>
                        <p class="text-[8px] font-bold uppercase opacity-40 mt-1">Invitado</p>
                    </div>
                </div>
                <div class="absolute -top-2 -right-2 w-8 h-8 bg-danger text-white rounded-full flex items-center justify-center border-4 border-white shadow-hard-sm opacity-0 peer-checked:opacity-100 transition-opacity">
                    <span class="material-symbols-outlined text-sm">check</span>
                </div>
            </label>

            <!-- Other Player -->
            <label class="block relative cursor-pointer group">
                <input type="radio" name="vote" class="peer hidden">
                <div class="bg-white p-5 rounded-card border-4 border-ink/5 shadow-hard peer-checked:border-danger peer-checked:bg-danger-muted transition-all paper-card flex flex-col items-center gap-3">
                    <div class="w-20 h-20 bg-accent rounded-full border-4 border-white shadow-hard flex items-center justify-center text-4xl shrink-0 transition-transform group-hover:scale-105">
                        🤖
                    </div>
                    <div class="text-center">
                        <h3 class="font-display text-lg uppercase tracking-tight leading-none">Luis</h3>
                        <p class="text-[8px] font-bold uppercase opacity-40 mt-1">Invitado</p>
                    </div>
                </div>
                <div class="absolute -top-2 -right-2 w-8 h-8 bg-danger text-white rounded-full flex items-center justify-center border-4 border-white shadow-hard-sm opacity-0 peer-checked:opacity-100 transition-opacity">
                    <span class="material-symbols-outlined text-sm">check</span>
                </div>
            </label>

            <!-- Eliminated Player (Disabled) -->
            <div class="opacity-30 grayscale p-5 flex flex-col items-center gap-3">
                <div class="w-20 h-20 bg-gray-200 rounded-full border-4 border-white flex items-center justify-center text-4xl grayscale">
                    💀
                </div>
                <div class="text-center">
                    <h3 class="font-display text-lg uppercase tracking-tight leading-none">Charlie</h3>
                    <p class="text-[8px] font-bold uppercase opacity-100 mt-1">Fuera</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer Actions -->
    <footer class="p-6 bg-white border-t border-ink/5 shadow-[0_-4px_20px_rgba(43,45,66,0.05)] rounded-t-[32px] space-y-4">
        <a href="08_Elimination_Suspense.html" class="w-full block bg-danger text-white font-display text-2xl py-5 rounded-btn shadow-hard-lg active:translate-y-1 active:shadow-none transition-all uppercase tracking-widest text-center flex items-center justify-center gap-3">
            Confirmar Voto
            <span class="material-symbols-outlined text-2xl">fingerprint</span>
        </a>

        <a href="08_Elimination_Suspense.html" class="w-full block bg-white border-2 border-ink/10 text-ink/40 font-display py-4 rounded-btn shadow-hard active:translate-y-1 transition-all text-center uppercase tracking-widest flex items-center justify-center gap-2">
            Saltar Voto
            <span class="text-[10px] font-extrabold bg-accent-muted text-accent px-2 py-0.5 rounded-full border border-accent/10">+5 PTS</span>
        </a>
    </footer>

</body>
</html>
