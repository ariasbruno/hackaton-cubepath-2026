<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caos: Almas Unidas - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:wght@200..800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "secondary": "#4D9DE0",
                        "accent": "#87C38F",
                        "danger": "#E63946",
                        "brand-purple": "#9D4EDD",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                    },
                    fontFamily: {
                        "display": ["Fredoka", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.15)',
                        'hard-2xl': '12px 12px 0px rgba(43, 45, 66, 0.4)',
                    },
                    borderWidth: {
                        '3': '3px',
                    },
                    borderRadius: {
                        '4xl': '2rem',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-dots {
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
        .animate-fade-in-up {
            animation: fade-in-up 0.6s ease-out forwards;
        }
        .delay-0 { animation-delay: 0ms; }
        .delay-200 { animation-delay: 200ms; }
        .rotate-41 { transform: rotate(41deg); }
    </style>
</head>
<body class="h-screen w-screen bg-[#310E68] pattern-dots relative overflow-hidden flex flex-col items-center justify-center p-6 text-white text-center font-body">

    <!-- Background Decor -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[150%] h-[50%] bg-purple-500/30 blur-[120px] rotate-41 pointer-events-none"></div>
    <div class="absolute inset-0 bg-gradient-to-b from-transparent via-purple-900/40 to-[#1A202C]/60 pointer-events-none"></div>

    <main class="relative z-10 space-y-10 animate-fade-in w-full max-w-lg">
        
        <div class="space-y-4 flex flex-col items-center">
            <div class="inline-flex items-center gap-2 px-6 py-2 bg-purple-500/20 rounded-full backdrop-blur-xl border border-purple-400/30 shadow-[0_0_20px_rgba(139,92,246,0.2)]">
                <span class="material-symbols-outlined text-purple-300 animate-pulse text-base">favorite</span>
                <span class="text-xs font-black uppercase tracking-[0.3em] text-purple-100 italic pt-0.5">Misión cumplida</span>
            </div>

            <h1 class="font-display font-bold text-5xl md:text-7xl italic leading-none uppercase tracking-tighter drop-shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
                ¡ALMAS <br />
                <span class="text-purple-300 drop-shadow-[0_0_30px_rgba(167,139,250,0.8)] border-b-8 border-purple-500/50">UNIDAS!</span>
            </h1>
        </div>

        <div class="flex items-center justify-center gap-4 relative py-8">
            
            <!-- Jugador 1 -->
            <div class="flex flex-col items-center gap-4 animate-fade-in-up delay-0">
                <div class="relative group">
                    <div class="absolute inset-0 bg-purple-400 blur-2xl rounded-full opacity-40 scale-125 group-hover:opacity-60 transition-opacity"></div>
                    <!-- Outer React wrapper -->
                    <div class="relative inline-flex items-center justify-center rounded-full border-white shadow-hard relative z-10 transform scale-110">
                        <!-- Inner avatar container imitating Avatar.tsx -->
                        <div class="w-20 h-20 p-3 border-4 border-ink/5 rounded-full flex items-center justify-center overflow-hidden bg-[#FFD166]">
                            <span class="text-5xl -translate-y-1">🐻</span>
                        </div>
                    </div>
                </div>
                <h3 class="font-display text-xl uppercase tracking-wider text-purple-100">Bruno</h3>
            </div>

            <!-- Connection Visual -->
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-[60%] flex items-center justify-center w-full z-0 opacity-40">
                <div class="w-16 h-1 bg-gradient-to-r from-transparent via-purple-300 to-transparent blur-[2px] animate-pulse"></div>
                <span class="material-symbols-outlined text-purple-300 mx-1 animate-pulse text-3xl">bolt</span>
                <div class="w-16 h-1 bg-gradient-to-r from-transparent via-purple-300 to-transparent blur-[2px] animate-pulse"></div>
            </div>

            <!-- Jugador 2 -->
            <div class="flex flex-col items-center gap-4 animate-fade-in-up delay-200">
                <div class="relative group">
                    <div class="absolute inset-0 bg-purple-400 blur-2xl rounded-full opacity-40 scale-125 group-hover:opacity-60 transition-opacity"></div>
                    <!-- Outer React wrapper -->
                    <div class="relative inline-flex items-center justify-center rounded-full border-white shadow-hard relative z-10 transform scale-110">
                        <!-- Inner avatar container imitating Avatar.tsx -->
                        <div class="w-20 h-20 p-3 border-4 border-ink/5 rounded-full flex items-center justify-center overflow-hidden bg-[#118AB2]">
                            <!-- Here we use the generic text to mirror image 1 -->
                            <span class="text-xs font-black rotate-[-10deg] opacity-70">noto-<br/>cat</span>
                        </div>
                    </div>
                </div>
                <h3 class="font-display text-xl uppercase tracking-wider text-purple-100">Ana</h3>
            </div>
            
        </div>

        <div class="bg-white/5 backdrop-blur-2xl rounded-4xl p-8 border-4 border-purple-400/20 shadow-hard-2xl transform hover:scale-105 transition-transform mx-auto">
            <p class="text-[10px] uppercase font-black tracking-[0.4em] text-purple-400 leading-none mb-4 opacity-80">La conexión era absoluta en</p>
            <h2 class="text-4xl sm:text-5xl md:text-6xl font-display font-bold uppercase italic tracking-[0.10em] text-white drop-shadow-[0_5px_15px_rgba(0,0,0,0.3)]">COMPUTADORA</h2>
        </div>

        <p class="text-sm font-medium text-purple-200/50 leading-relaxed px-12 pt-4">
            La pareja se ha encontrado en medio del Caos. <br />
            El orden ha sido restaurado.
        </p>

        <div class="pt-4 opacity-30 mt-4">
            <div class="flex items-center justify-center gap-3 text-purple-100">
                <div class="w-4 h-4 border-2 border-purple-100 border-t-transparent rounded-full animate-spin"></div>
                <p class="font-mono uppercase tracking-[0.3em] text-[10px] font-black">Cerrando transmisión...</p>
            </div>
        </div>

    </main>

</body>
</html>
