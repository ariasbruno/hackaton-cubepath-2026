<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agente Eliminado - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "primary-muted": "#FFF0E5",
                        "secondary": "#4D9DE0",
                        "accent": "#87C38F",
                        "danger": "#E63946",
                        "danger-muted": "#FFF0F1",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                        "shadow-col": "rgba(43, 45, 66, 0.15)",
                    },
                    fontFamily: {
                        "display": ["Fredoka One", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.15)',
                        'hard-lg': '6px 6px 0px rgba(43, 45, 66, 0.15)',
                    },
                    borderRadius: {
                        'card': '24px',
                        'btn': '16px',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-checkers {
            background-image: repeating-linear-gradient(45deg, rgba(0, 0, 0, 0.1) 25px, transparent 25px, transparent 50px, rgba(0, 0, 0, 0.1) 50px, rgba(0, 0, 0, 0.1) 75px, transparent 75px, transparent 100px);
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
        
        @keyframes countdown {
            from { width: 100%; }
            to { width: 0%; }
        }
        .animate-countdown {
            animation: countdown 5s linear forwards;
        }
        .float {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body class="bg-ink text-white font-body min-h-screen flex flex-col items-center justify-center p-6 text-center pattern-checkers max-w-md mx-auto shadow-2xl overflow-hidden relative">

    <main class="flex-1 flex flex-col items-center justify-center space-y-12 w-full animate-fade-in relative z-10">
        <div class="relative w-full">
            <div class="absolute inset-0 bg-white/5 blur-3xl rounded-full scale-110 animate-pulse"></div>
            <h1 class="font-display text-5xl md:text-6xl drop-shadow-lg leading-tight rotate-[-3deg] uppercase">¡ERROR<br/>FATAL!</h1>
        </div>

        <!-- The Victim Card -->
        <div class="relative w-full max-w-xs">
            <div class="bg-white text-ink p-8 rounded-card border-4 border-ink shadow-hard-lg relative z-10">
                <div class="w-24 h-24 bg-ink/5 rounded-full border-4 border-ink/10 flex items-center justify-center mx-auto mb-6 relative">
                    <span class="text-6xl grayscale opacity-40">🐱</span>
                    <div class="absolute -top-2 -right-2 bg-danger text-white p-1 rounded-md shadow-hard-sm">
                        <span class="text-sm">👻</span>
                    </div>
                </div>
                <h2 class="font-display text-4xl mb-1 uppercase tracking-tight">BRUNO</h2>
                <p class="text-ink/40 text-[10px] font-extrabold uppercase tracking-[0.2em] mb-6">Era un Agente Inocente</p>
                
                <div class="p-4 bg-danger-muted border-2 border-danger/20 rounded-btn">
                    <p class="text-danger text-xs font-bold leading-relaxed uppercase tracking-widest italic">
                        "¡Se los dije! ¡Yo no era!"
                    </p>
                </div>
            </div>
            
            <!-- Floating Ghosts (Emojis for stability) -->
            <div class="absolute -top-12 -right-6 float opacity-20 text-5xl" style="animation-delay: 0.5s;">
                👻
            </div>
            <div class="absolute top-1/2 -left-8 float opacity-10 text-4xl" style="animation-delay: 1.5s;">
                👻
            </div>
        </div>

        <div class="w-full max-w-xs space-y-4">
            <p class="text-white/60 font-bold uppercase tracking-[0.3em] text-[10px] animate-pulse">El impostor sigue entre nosotros...</p>
            <!-- Thin Time Bar -->
            <div class="w-full h-1.5 bg-white/10 rounded-full overflow-hidden">
                <div class="h-full bg-danger animate-countdown"></div>
            </div>
        </div>
    </main>

    <footer class="p-6 w-full relative z-10">
        <a href="06_Pistas.html" class="w-full block bg-white text-ink font-display text-2xl py-5 rounded-btn shadow-hard active:translate-y-1 transition-all uppercase tracking-widest text-center">
            Siguiente Ronda
        </a>
    </footer>

</body>
</html>
