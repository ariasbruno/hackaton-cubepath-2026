<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revelación Infiltrado - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:wght@200..800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "secondary": "#4D9DE0",
                        "accent": "#87C38F",
                        "danger": "#E63946",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                    },
                    fontFamily: {
                        "display": ["Fredoka", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.15)',
                        'hard-lg': '8px 8px 0px rgba(43, 45, 66, 0.3)',
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes spotlight {
            0% { opacity: 0; transform: scale(0.8); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }
        @keyframes reveal-bg-blue {
            0% { background-color: #2B2D42; }
            100% { background-color: #4D9DE0; }
        }
        @keyframes stamp-blue {
            0% { transform: scale(5); opacity: 0; }
            100% { transform: scale(1) rotate(-3deg); opacity: 1; }
        }
        @keyframes slide-reveal {
            0% { transform: translateY(50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .animate-spotlight { animation: spotlight 1s ease-out forwards; }
        .animate-reveal-bg { animation: reveal-bg-blue 0.5s 3.5s forwards; }
        .animate-stamp { opacity: 0; animation: stamp-blue 0.4s 4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-words { opacity: 0; animation: slide-reveal 0.6s 4.8s ease-out forwards; }
        
        .delay-1 { animation-delay: 1s; }
        .delay-2 { animation-delay: 2s; }

        .pattern-checkers {
            background-image: repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.05) 25px, transparent 25px, transparent 50px, rgba(255, 255, 255, 0.05) 50px, rgba(255, 255, 255, 0.05) 75px, transparent 75px, transparent 100px);
        }
    </style>
</head>
<body class="bg-ink text-white font-body min-h-screen flex flex-col items-center justify-center overflow-hidden animate-reveal-bg">
    
    <div class="absolute inset-0 pattern-checkers opacity-10"></div>

    <!-- Escena de Revelación -->
    <main class="relative z-10 flex flex-col items-center gap-8 w-full max-w-md p-6">
        
        <!-- Fase 1: El Veredicto -->
        <div class="text-center space-y-2">
            <p class="font-display text-lg uppercase tracking-[0.3em] opacity-0 animate-spotlight">Buscando al infiltrado...</p>
            <h1 class="font-display text-6xl uppercase tracking-tighter opacity-0 animate-spotlight delay-1">ANA</h1>
        </div>

        <!-- Fase 2: Avatar -->
        <div class="relative group animate-spotlight delay-2">
            <div class="absolute inset-0 bg-white/10 blur-3xl rounded-full scale-150 animate-pulse"></div>
            <div class="relative bg-white p-2 rounded-full border-8 border-ink shadow-hard-lg">
                <div class="w-40 h-40 rounded-full overflow-hidden bg-secondary flex items-center justify-center border-4 border-ink">
                    <span class="text-8xl">🦊</span>
                </div>
            </div>

            <!-- Fase 3: El Sello -->
            <div class="absolute -bottom-2 -right-6 z-20 animate-stamp">
                <div class="bg-white text-secondary px-6 py-3 border-4 border-ink shadow-hard rounded-xl rotate-[-3deg]">
                    <p class="font-display text-3xl uppercase leading-none">¡INFILTRADO!</p>
                </div>
            </div>
        </div>

        <!-- Fase 4: Comparación de Palabras (El Clímax de Cercanas) -->
        <div class="w-full space-y-4 animate-words">
            <div class="bg-white/10 backdrop-blur-md p-6 rounded-2xl border-4 border-white/20 shadow-hard text-center">
                <div class="flex justify-around items-center gap-4">
                    <div>
                        <p class="text-[10px] font-black uppercase opacity-60 mb-1">Agentes</p>
                        <p class="font-display text-3xl text-white uppercase tracking-tighter">PERRO</p>
                    </div>
                    <div class="w-px h-12 bg-white/20"></div>
                    <div>
                        <p class="text-[10px] font-black uppercase text-secondary-muted mb-1">Infiltrado</p>
                        <p class="font-display text-3xl text-secondary-muted uppercase tracking-tighter">LOBO</p>
                    </div>
                </div>
            </div>
            <p class="text-center font-display text-xl uppercase tracking-widest text-white/80">¡Casi nos engañas!</p>
        </div>

    </main>

    <!-- Botón para continuar -->
    <footer class="absolute bottom-10 w-full max-w-xs px-6 opacity-0 animate-words" style="animation-delay: 5.5s">
        <a href="09_Results_Points.html" class="w-full block bg-white text-ink font-display text-2xl py-5 rounded-xl shadow-hard hover:translate-y-1 active:translate-y-2 active:shadow-none transition-all text-center uppercase tracking-widest">
            Ver Puntuación
        </a>
    </footer>

</body>
</html>
