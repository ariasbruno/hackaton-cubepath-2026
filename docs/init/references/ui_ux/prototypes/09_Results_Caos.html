<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados Caos - El Impostor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8C42",
                        "primary-muted": "#FFF0E5",
                        "secondary": "#4D9DE0",
                        "accent": "#87C38F",
                        "danger": "#E63946",
                        "purple": "#9D4EDD",
                        "purple-muted": "#F5E6FF",
                        "ink": "#2B2D42",
                        "bg-paper": "#FDFBF7",
                        "shadow-col": "rgba(43, 45, 66, 0.15)",
                        "sticky-yellow": "#FFD166",
                    },
                    fontFamily: {
                        "display": ["Fredoka One", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px rgba(43, 45, 66, 0.15)',
                        'hard-sm': '2px 2px 0px rgba(43, 45, 66, 0.15)',
                        'hard-lg': '6px 6px 0px rgba(43, 45, 66, 0.15)',
                        'inner-hard': 'inset 3px 3px 0px rgba(0,0,0,0.1)',
                    },
                    borderRadius: {
                        'card': '24px',
                        'btn': '16px',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-checkers {
            background-image: repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.05) 25px, transparent 25px, transparent 50px, rgba(255, 255, 255, 0.05) 50px, rgba(255, 255, 255, 0.05) 75px, transparent 75px, transparent 100px);
        }
        .paper-tear {
            clip-path: polygon(0% 0%, 100% 0%, 100% 95%, 95% 100%, 85% 92%, 75% 100%, 65% 92%, 55% 100%, 45% 92%, 35% 100%, 25% 92%, 15% 100%, 5% 92%, 0% 100%);
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
    </style>
</head>
<body class="bg-purple text-white font-body min-h-screen flex flex-col items-center justify-center p-6 text-center pattern-checkers max-w-md mx-auto shadow-2xl overflow-hidden relative">

    <main class="w-full max-w-lg flex flex-col items-center gap-8 animate-fade-in relative z-10">
        <h1 class="font-display text-5xl md:text-6xl drop-shadow-lg leading-tight rotate-[-2deg] uppercase tracking-tight">
            REVELACIÓN<br/>FINAL
        </h1>

        <div class="bg-white text-ink w-full paper-tear shadow-hard-lg p-8 pb-16 relative overflow-hidden">
            <div class="absolute -top-6 left-1/2 -translate-x-1/2 bg-purple text-white px-8 py-2 rounded-full font-display text-xl shadow-hard border-2 border-white uppercase">Vínculos & Palabras</div>
            
            <div class="mt-8 space-y-8">
                <!-- THE PAIR (VINCULADOS) -->
                <div class="space-y-3 text-left">
                    <p class="text-[8px] font-extrabold uppercase tracking-[0.3em] text-purple/60 ml-1">La Pareja Vinculada</p>
                    <div class="bg-purple-muted p-4 rounded-btn border-4 border-purple/20 shadow-hard flex items-center justify-between relative overflow-hidden">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-primary rounded-full border-2 border-white shadow-hard-sm flex items-center justify-center text-xl">🐱</div>
                            <div class="w-10 h-10 bg-secondary rounded-full border-2 border-white shadow-hard-sm flex items-center justify-center text-xl">🦊</div>
                        </div>
                        <div class="bg-purple text-white px-4 py-1.5 rounded-full font-display text-lg shadow-sm rotate-2 uppercase tracking-widest">RAYO</div>
                    </div>
                </div>

                <!-- DISPERSOS LIST -->
                <div class="space-y-3 text-left">
                    <p class="text-[8px] font-extrabold uppercase tracking-[0.3em] text-ink/30 ml-1">Los Dispersos (Palabras Únicas)</p>
                    <div class="grid grid-cols-1 gap-2">
                        <div class="bg-bg-paper p-3 rounded-btn border-2 border-ink/5 flex justify-between items-center opacity-80 shadow-sm">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 bg-accent rounded-full border-2 border-white shadow-hard-sm flex items-center justify-center text-lg">🤖</div>
                                <span class="font-bold text-xs uppercase tracking-tight">Luis</span>
                            </div>
                            <span class="bg-white px-3 py-1 rounded-full text-[10px] font-mono font-bold border border-ink/10 uppercase">Zorro</span>
                        </div>
                        <div class="bg-bg-paper p-3 rounded-btn border-2 border-ink/5 flex justify-between items-center opacity-80 shadow-sm">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 bg-neutral rounded-full border-2 border-white shadow-hard-sm flex items-center justify-center text-lg" style="background-color: #A066F1;">👾</div>
                                <span class="font-bold text-xs uppercase tracking-tight">Sara</span>
                            </div>
                            <span class="bg-white px-3 py-1 rounded-full text-[10px] font-mono font-bold border border-ink/10 uppercase">Perro</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Global Result -->
            <div class="mt-10 pt-6 border-t-2 border-dashed border-ink/10">
                <div class="bg-ink text-white p-4 rounded-card shadow-hard-lg rotate-1">
                    <h3 class="font-display text-2xl uppercase leading-none mb-1">¡Vínculo Logrado!</h3>
                    <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest">La pareja ganó la partida</p>
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-4 w-full">
            <a href="09_Results_Points.html" class="w-full block bg-white text-purple font-display text-2xl py-5 rounded-btn shadow-hard-lg active:translate-y-1 transition-all uppercase tracking-widest text-center">
                Ver Puntuaciones
            </a>
            <a href="04_Lobby_Caos.html" class="w-full block bg-ink text-white font-display text-lg py-4 rounded-btn shadow-hard active:translate-y-1 transition-all uppercase tracking-widest text-center">
                Volver al Lobby
            </a>
        </div>
    </main>

</body>
</html>
