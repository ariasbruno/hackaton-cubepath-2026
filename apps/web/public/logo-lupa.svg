<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <!-- Sombra Neubrutalista proyectada -->
  <g transform="translate(8, 8)" opacity="0.15">
    <rect x="12" y="90" width="48" height="18" rx="9" fill="#2B2D42" transform="rotate(-45 36 99)" />
    <circle cx="80" cy="48" r="44" fill="#2B2D42" />
  </g>

  <!-- Mango de la Lupa (Primary Orange) -->
  <rect x="12" y="90" width="48" height="18" rx="9" fill="#FF8C42" stroke="#2B2D42" stroke-width="8" transform="rotate(-45 36 99)" />

  <!-- Marco de la Lupa (Secondary Blue - Representando la investigación) -->
  <circle cx="80" cy="48" r="44" fill="#4D9DE0" stroke="#2B2D42" stroke-width="8" />

  <!-- Cristal / Fondo interior -->
  <circle cx="80" cy="48" r="32" fill="#FFFFFF" stroke="#2B2D42" stroke-width="4" />

  <!-- El Ojo del Impostor (Revelado a través de la lupa) -->
  <g transform="translate(80, 48)">
    <ellipse cx="0" cy="0" rx="22" ry="14" fill="#FFFFFF" stroke="#2B2D42" stroke-width="6" />
    <!-- Pupila mirando de forma sospechosa -->
    <circle cx="6" cy="0" r="7" fill="#2B2D42" />
    <circle cx="8" cy="-3" r="2.5" fill="#FFFFFF" />
  </g>

  <!-- Brillo decorativo en el cristal -->
  <circle cx="62" cy="30" r="5" fill="#FFFFFF" opacity="0.5" />
</svg>